<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blink — Profile & Live</title>
    <!-- Expert UI: Modern, Mobile-First Instagram Clone -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #ff2d6e;
            --secondary: #0095f6;
            --bg: #fafafa;
            --text: #262626;
            --border: #dbdbdb;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* ── PROFILE HEADER — INSTAGRAM STYLE ────────────────── */
        .profile-container { max-width: 935px; margin: 20px auto; padding: 20px; }
        .profile-header { display: flex; align-items: center; gap: 40px; margin-bottom: 40px; }
        .avatar-wrap { 
            position: relative; width: 150px; height: 150px; 
            border-radius: 50%; overflow: hidden; border: 1px solid var(--border);
            cursor: pointer;
        }
        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.3);
            display: none; align-items: center; justify-content: center;
            color: white; font-size: 24px;
        }
        .avatar-wrap:hover .avatar-overlay { display: flex; }

        .profile-info { flex: 1; }
        .id-row { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .id-row h2 { font-size: 28px; font-weight: 300; }
        .id-row .btn { 
            padding: 8px 20px; border-radius: 4px; border: 1px solid var(--border);
            background: white; font-weight: 600; cursor: pointer;
        }

        .stats-row { display: flex; gap: 40px; margin-bottom: 20px; font-size: 16px; }
        .stat span { font-weight: 600; }

        .bio-row { line-height: 1.5; font-size: 16px; }

        /* ── LIVE PLAYER — SHORTS STYLE ──────────────────────── */
        .live-player-container { 
            position: fixed; inset: 0; background: black; z-index: 1000;
            display: none; flex-direction: column;
        }
        .live-player-container.active { display: flex; }
        
        .video-wrapper { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #videoPlayer { width: 100%; height: 100%; object-fit: cover; }

        /* ── LIVE CHAT — AS REQUESTED ───────────────────────── */
        .live-chat {
            position: absolute; bottom: 80px; left: 10px; right: 10px;
            height: 200px; overflow-y: auto; display: flex; flex-direction: column;
            gap: 8px; mask-image: linear-gradient(to top, black 80%, transparent 100%);
        }
        .chat-row { display: flex; align-items: flex-start; gap: 10px; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); font-size: 14px; }
        .chat-avatar { width: 30px; height: 30px; border-radius: 50%; }

        .chat-input-row {
            padding: 15px; display: flex; gap: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
        }
        #chatInput { flex: 1; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); padding: 10px; border-radius: 20px; color: white; outline: none; }
        #sendChatBtn { background: var(--secondary); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 700; cursor: pointer; }

        /* ── RESPONSIVE — MOBILE ────────────────────────────── */
        @media (max-width: 736px) {
            .profile-header { gap: 20px; flex-direction: column; text-align: center; }
            .avatar-wrap { width: 100px; height: 100px; }
            .id-row { flex-direction: column; gap: 10px; }
            .stats-row { justify-content: center; gap: 20px; }
        }
    </style>
</head>
<body>

    <!-- Main App Container -->
    <div id="app">
        <!-- Profile Page -->
        <main class="profile-container" id="profilePage">
            <header class="profile-header">
                <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
                    <img id="profilePhoto" src="/img/default-avatar.svg" alt="Avatar">
                    <div class="avatar-overlay">
                        <i class="bi bi-camera-fill"></i>
                    </div>
                </div>
                <!-- Hidden Upload -->
                <input type="file" id="avatarInput" accept="image/*" style="display: none" onchange="uploadAvatar(this.files[0])">

                <div class="profile-info">
                    <div class="id-row">
                        <h2 id="profileUsername">username</h2>
                        <button class="btn" id="editProfileBtn">Edit Profile</button>
                        <button class="btn btn-primary" id="goLiveBtn" style="background: var(--primary); color: white; border: none">Go Live</button>
                    </div>
                    <div class="stats-row">
                        <div class="stat"><span id="postCount">0</span> posts</div>
                        <div class="stat"><span id="followerCount">0</span> followers</div>
                        <div class="stat"><span id="followingCount">0</span> following</div>
                    </div>
                    <div class="bio-row">
                        <p id="profileBio">This is a short bio about me.</p>
                    </div>
                </div>
            </header>

            <hr style="border: none; border-top: 1px solid var(--border); margin: 30px 0;">

            <!-- Grid Grid — IG Style -->
            <div id="postGrid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px;">
                <!-- Post items will be injected here -->
            </div>
        </main>

        <!-- Live Player Modal — SHORTS STYLE -->
        <div class="live-player-container" id="livePlayer">
            <div class="video-wrapper">
                <video id="videoPlayer" playsinline muted autoplay></video>
                
                <!-- Chat Overlay -->
                <div class="live-chat" id="chatMessages">
                    <!-- Messages appear here -->
                </div>
            </div>

            <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="Add a comment...">
                <button id="sendChatBtn">Post</button>
                <button onclick="document.getElementById('livePlayer').classList.remove('active')" style="background: rgba(255,255,255,0.2); color: white; border: none; padding: 10px; border-radius: 50%">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- TABS TOAST SYSTEM -->
    <div id="toastContainer" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 5000;"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
