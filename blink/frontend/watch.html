<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watching Live | Blink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .watch-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }
        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .live-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }
        .live-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }
        .streamer-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }
        .streamer-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #ff0050;
        }
        .live-badge {
            background: #ff0050;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 900;
        }
        .chat-container {
            height: 250px;
            overflow-y: auto;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
            mask-image: linear-gradient(to top, black 80%, transparent 100%);
        }
        .chat-msg {
            background: rgba(0,0,0,0.2);
            padding: 4px 10px;
            border-radius: 10px;
            color: white;
            font-size: 13px;
            width: fit-content;
        }
        .chat-msg b { color: var(--primary); margin-right: 6px; }
        .watch-controls {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        #chatInput {
            flex: 1;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 8px 16px;
            color: white;
            font-size: 14px;
        }
        .error-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="watch-container">
        <video id="remoteVideo" autoplay playsinline></video>
        
        <div class="live-overlay">
            <div class="live-header">
                <div class="streamer-info">
                    <img id="streamerAvatar" src="https://via.placeholder.com/150" class="streamer-avatar">
                    <div>
                        <div id="streamerName" style="font-weight: 700; font-size: 14px;">Username</div>
                        <div class="live-badge">LIVE</div>
                    </div>
                </div>
                <button class="btn btn-secondary btn-sm" onclick="window.close(); window.location.href='index.html'">Exit</button>
            </div>

            <div>
                <div id="chatBox" class="chat-container"></div>
                <div class="watch-controls">
                    <input type="text" id="chatInput" placeholder="Add a comment...">
                    <button class="btn btn-primary btn-sm" id="sendBtn">Send</button>
                </div>
            </div>
        </div>

        <div id="errorOverlay" class="error-overlay">
            <i class="bi bi-broadcast" style="font-size: 48px; margin-bottom: 20px; color: #ff0050;"></i>
            <h3 id="errorTitle">Live Ended</h3>
            <p id="errorMsg">The streamer was looking at something else.</p>
            <button class="btn btn-primary" onclick="window.location.href='index.html'">Back to Home</button>
        </div>
            <!-- Mobile Nav -->
        <nav class="mobile-nav">
            <a href="index.html" class="nav-item" data-page="index">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <div class="nav-item" id="mobileSearchBtn">
                <i class="bi bi-search"></i>
                <span>Search</span>
            </div>
            <a href="upload.html" class="nav-item" data-page="upload">
                <i class="bi bi-plus-square"></i>
                <span>Create</span>
            </a>
            <a href="live.html" class="nav-item" data-page="live">
                <i class="bi bi-broadcast"></i>
                <span>Live</span>
            </a>
            <a href="messages.html" class="nav-item" data-page="messages">
                <i class="bi bi-chat-dots-fill"></i>
                <span>Messages</span>
            </a>
            <a href="profile.html" class="nav-item" data-page="profile">
                <i class="bi bi-person-circle"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/watch.js"></script>
</body>
</html>
