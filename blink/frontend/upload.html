<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Creator Studio</title>
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>

    <div class="app-container">
        
        <!-- ── SIDEBAR (Desktop) ─────────────────────── -->
        <aside class="app-sidebar">
            <div class="nav-logo">
                <span class="text-gradient" style="font-size: 32px;">B</span>
                <h2 class="text-gradient">Blink</h2>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-link">
                    <i class="bi bi-house-door"></i>
                    <span>Home</span>
                </a>
                <a href="upload.html" class="nav-link active">
                    <i class="bi bi-plus-square-fill"></i>
                    <span>Create</span>
                </a>
                <a href="explore.html" class="nav-link">
                    <i class="bi bi-compass"></i>
                    <span>Explore</span>
                </a>
                <a href="messages.html" class="nav-link">
                    <i class="bi bi-chat-dots"></i>
                    <span>Messages</span>
                </a>
                <a href="profile.html" class="nav-link" id="sidebarProfileLink">
                    <img id="sidebarAvatarImg" src="https://via.placeholder.com/24" class="avatar" style="width:24px; height:24px;">
                    <span>Profile</span>
                </a>
            </nav>

            <div class="sidebar-footer" style="padding: 20px;">
                <button id="logoutBtn" class="nav-link w-full">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- ── CREATE CONTENT AREA ────────────────────────────── -->
        <main class="main-content">
            <div class="upload-container animate-fade">
                
                <header class="flex-col gap-1">
                    <h1 class="text-gradient">Creator Studio</h1>
                    <p style="color: var(--text-secondary); margin-bottom: var(--space-md);">Share a new highlight with your Blink community.</p>
                </header>

                <div class="upload-card">
                    <!-- Drop Zone -->
                    <div class="drop-zone" id="dropzone">
                        <input type="file" id="mediaInput" accept="video/*,image/*" hidden>
                        
                        <div id="dropzoneContent" class="flex-col flex-center gap-1">
                            <i class="bi bi-plus-circle-dotted"></i>
                            <h3 style="color: white;">Select Video</h3>
                            <p style="font-size: 13px;">MP4 or WebM recommended (9:16)</p>
                            <button class="btn btn-secondary" style="margin-top: 16px;">Browse device</button>
                        </div>
                        
                        <!-- Preview Container -->
                        <video id="videoPreview" class="preview-player" style="display: none;" loop muted></video>
                    </div>

                    <!-- Form Section -->
                    <div class="form-group">
                        <label class="form-label">Tell a story (Caption)</label>
                        <div class="input-wrap">
                            <textarea id="captionInput" class="form-input" style="height: 120px; resize: none;" placeholder="What's happening? #BlinkMoment"></textarea>
                        </div>
                    </div>

                    <!-- Upload State -->
                    <div id="uploadProgress" class="hidden">
                        <div class="flex-between" style="margin-bottom: 8px;">
                            <span id="progressText" style="font-size: 13px; font-weight: 700;">Uploading... 0%</span>
                            <div class="loader" style="width: 16px; height: 16px; border-width: 2px;"></div>
                        </div>
                        <div class="upload-progress">
                            <div id="progressFill" class="progress-fill"></div>
                        </div>
                    </div>

                    <button id="publishBtn" class="btn btn-primary w-full" style="height: 52px; font-size: 16px;">
                        Post Blink
                    </button>
                </div>

            </div>
        </main>

        <!-- ── MOBILE BOTTOM NAVIGATION ─────────────────── -->
        <nav class="bottom-nav">
            <a href="index.html" class="bottom-link">
                <i class="bi bi-house-door"></i>
            </a>
            <a href="explore.html" class="bottom-link">
                <i class="bi bi-search"></i>
            </a>
            <a href="upload.html" class="bottom-link active">
                <i class="bi bi-plus-square-fill"></i>
            </a>
            <a href="messages.html" class="bottom-link">
                <i class="bi bi-chat-dots"></i>
            </a>
            <a href="profile.html" class="bottom-link">
                <img id="mobileAvatarImg" src="https://via.placeholder.com/24" class="avatar" style="width:24px; height:24px; border:none;">
            </a>
        </nav>

    </div>

    <!-- ── NOTIFICATIONS ─────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── SCRIPTS ────────────────────────────────────────────── -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
