<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Create | Blink</title>
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <div class="app-container">
                <!-- Sidebar (Desktop) -->
        <aside class="sidebar">
            <div class="logo text-gradient flex-center py-4">Blink</div>
            <nav class="nav-links flex-col flex-1">
                <a href="index.html" class="nav-item" data-page="index">
                    <i class="bi bi-house-door-fill"></i>
                    <span class="nav-text">Home</span>
                </a>
                <div class="nav-item" id="searchTrigger">
                    <i class="bi bi-search"></i>
                    <span class="nav-text">Search</span>
                </div>
                <a href="upload.html" class="nav-item" data-page="upload">
                    <i class="bi bi-plus-square"></i>
                    <span class="nav-text">Create</span>
                </a>
                <a href="live.html" class="nav-item" data-page="live">
                    <i class="bi bi-broadcast"></i>
                    <span class="nav-text">Live</span>
                </a>
                <a href="messages.html" class="nav-item" data-page="messages">
                    <i class="bi bi-chat-dots-fill"></i>
                    <span class="nav-text">Messages</span>
                </a>
                <a href="profile.html" class="nav-item" data-page="profile">
                    <i class="bi bi-person-circle"></i>
                    <span class="nav-text">Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="nav-item w-full">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="nav-text">Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content flex-center">
            <div class="upload-container animate-up w-full max-w-lg p-6">
                <header class="mb-8">
                    <h1 class="text-3xl font-800 text-gradient">Create New Post</h1>
                    <p class="text-secondary mt-2">Share your moment with the world.</p>
                </header>

                <div class="card p-6 bg-surface border-subtle">
                    <!-- Drop Zone -->
                    <div id="dropzone" class="drop-zone border-dashed border-2 border-primary rounded-xl p-12 text-center cursor-pointer hover:bg-primary-fade transition-all" style="height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;">
                        <input type="file" id="mediaInput" accept="video/*" hidden>
                        <i class="bi bi-camera-reels text-5xl text-primary"></i>
                        <h3 class="text-xl font-bold">Select video to upload</h3>
                        <p class="text-secondary text-sm">Or drag and drop a file</p>
                        <button class="btn btn-primary mt-4">Select file</button>
                        
                        <!-- Preview (Hidden by default) -->
                        <video id="videoPreview" class="hidden w-full h-full object-cover rounded-lg" loop muted controls></video>
                    </div>

                    <div class="mt-6 flex-col gap-4">
                        <div class="input-group">
                            <label class="text-sm font-600 mb-2 block">Caption</label>
                            <textarea id="captionInput" class="input-field w-full" rows="4" placeholder="Write a caption..."></textarea>
                        </div>

                        <!-- Progress Bar (Hidden) -->
                        <div id="uploadProgress" class="hidden mt-4">
                            <div class="flex-between mb-2">
                                <span class="text-sm" id="progressText">Uploading... 0%</span>
                                <div class="spinner-sm"></div>
                            </div>
                            <div class="w-full bg-border-subtle rounded-full h-2 overflow-hidden">
                                <div id="progressFill" class="bg-primary h-full transition-all" style="width: 0%"></div>
                            </div>
                        </div>

                        <button id="publishBtn" class="btn btn-primary w-full h-14 text-lg mt-6">Share Post</button>
                    </div>
                </div>
            </div>
        </main>

                <!-- Mobile Nav -->
        <nav class="mobile-nav">
            <a href="index.html" class="nav-item" data-page="index">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <div class="nav-item" id="mobileSearchBtn">
                <i class="bi bi-search"></i>
                <span>Search</span>
            </div>
            <a href="upload.html" class="nav-item" data-page="upload">
                <i class="bi bi-plus-square"></i>
                <span>Create</span>
            </a>
            <a href="live.html" class="nav-item" data-page="live">
                <i class="bi bi-broadcast"></i>
                <span>Live</span>
            </a>
            <a href="messages.html" class="nav-item" data-page="messages">
                <i class="bi bi-chat-dots-fill"></i>
                <span>Messages</span>
            </a>
            <a href="profile.html" class="nav-item" data-page="profile">
                <i class="bi bi-person-circle"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <!-- Same Search Overlay -->
    <div id="searchOverlay" class="modal-overlay hidden">
        <div class="search-modal animate-up">
            <div class="search-header flex-between">
                <h2>Search</h2>
                <button id="closeSearch" class="btn-circle btn-ghost"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="search-bar">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Search for users..." autocomplete="off">
            </div>
            <div id="searchResults" class="search-results-list"></div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
