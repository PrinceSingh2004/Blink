<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Create Studio</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div class="app-container">
        
        <!-- ── SIDEBAR (Desktop / Tablet) ─────────────────────── -->
        <aside class="app-sidebar">
            <div class="nav-logo">
                <span class="text-gradient" style="font-size: 40px; font-weight: 900;">B</span>
                <h2 class="text-gradient">Blink</h2>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-link">
                    <i class="bi bi-house-door-fill"></i>
                    <span>Home</span>
                </a>
                <a href="explore.html" class="nav-link">
                    <i class="bi bi-compass-fill"></i>
                    <span>Explore</span>
                </a>
                <a href="live.html" class="nav-link">
                    <i class="bi bi-broadcast"></i>
                    <span>Live</span>
                </a>
                <a href="messages.html" class="nav-link">
                    <i class="bi bi-chat-dots-fill"></i>
                    <span>Messages</span>
                </a>
                <a href="upload.html" class="nav-link active">
                    <i class="bi bi-plus-square-fill"></i>
                    <span>Create</span>
                </a>
                <a href="profile.html" class="nav-link" id="sidebarProfileLink">
                    <img id="sidebarAvatarImg" src="https://via.placeholder.com/32" class="avatar" style="width:32px; height:32px; border:2px solid var(--accent-primary);">
                    <span>Profile</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button id="logoutBtn" class="nav-link" style="width:100%; text-align:left; border:none; background:none;">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- ── CREATE CONTENT AREA ────────────────────────────── -->
        <main class="main-content flex-center" style="padding: var(--space-xl);">
            <div class="app-wrapper" style="max-width: 900px;">
                
                <section class="animate-slide-up" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: var(--space-xl);">
                    
                    <!-- DROPZONE AREA -->
                    <div class="glass flex-column flex-center" id="dropzone" style="aspect-ratio: 9/16; border-radius: var(--radius-lg); border: 2px dashed rgba(255,0,80,0.3); cursor: pointer; position: relative; overflow: hidden; padding: 40px; background: rgba(255,255,255,0.02);">
                        <input type="file" id="mediaInput" accept="video/*,image/*" hidden>
                        
                        <div id="dropzoneContent" class="text-center">
                            <i class="bi bi-cloud-arrow-up-fill" style="font-size: 64px; color: var(--accent-primary); opacity: 0.8; margin-bottom: 20px; display: block;"></i>
                            <h3 style="margin-bottom: 8px;">Upload Cinematic Blink</h3>
                            <p style="color: var(--text-muted); font-size: 14px;">Select or Drag & Drop a vertical video (9:16 recommended)</p>
                            <button class="btn btn-secondary" style="margin-top: 32px;">Browse Device</button>
                        </div>
                        
                        <!-- PREVIEW MEDIA -->
                        <video id="videoPreview" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none;" loop muted></video>
                        <img id="imagePreview" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none;">
                    </div>

                    <!-- FORM AREA -->
                    <div class="flex-column gap-lg" style="padding: var(--space-md);">
                        <div>
                            <h2 class="text-gradient">Share your story</h2>
                            <p>Customize how your Blink appears to the world.</p>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Caption</label>
                            <div class="input-wrap">
                                <textarea id="captionInput" class="form-input" style="height: 140px; resize: none;" placeholder="Write a compelling story..."></textarea>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Format Type</label>
                            <div class="input-wrap">
                                <select id="typeInput" class="form-input" style="appearance: none;">
                                    <option value="reel">Reel (Vertical Short)</option>
                                    <option value="post">Fixed Post (Square/Landscape)</option>
                                    <option value="story">Daily Story (24h)</option>
                                </select>
                            </div>
                        </div>

                        <!-- Progress Bar Container -->
                        <div id="uploadProgress" style="display: none; width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden; margin-top: 20px;">
                            <div id="progressFill" style="height: 100%; background: var(--accent-gradient); width: 0%; transition: width 0.3s ease;"></div>
                        </div>
                        <p id="progressText" style="display: none; text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 4px;">Uploading 0%</p>

                        <div style="flex: 1;"></div>

                        <button id="publishBtn" class="btn btn-primary" style="width: 100%; height: 56px; font-size: 16px;">
                            Publish Blink <i class="bi bi-send-check-fill" style="margin-left: 8px;"></i>
                        </button>
                    </div>

                </section>

            </div>
        </main>

        <!-- ── BOTTOM NAVIGATION (Mobile Only) ─────────────────── -->
        <nav class="bottom-nav">
            <a href="index.html" class="bottom-link">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <a href="explore.html" class="bottom-link">
                <i class="bi bi-search"></i>
                <span>Search</span>
            </a>
            <a href="upload.html" class="bottom-link active" style="transform: translateY(-2px);">
                <i class="bi bi-plus-square-fill" style="font-size: 32px; color: var(--text-primary);"></i>
            </a>
            <a href="messages.html" class="bottom-link">
                <i class="bi bi-chat-dots-fill"></i>
                <span>Chat</span>
            </a>
            <a href="profile.html" class="bottom-link">
                <img id="mobileAvatarImg" src="https://via.placeholder.com/24" class="avatar" style="width:24px; height:24px;">
                <span>Profile</span>
            </a>
        </nav>

    </div>

    <!-- ── NOTIFICATIONS ─────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── SCRIPTS ────────────────────────────────────────────── -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
