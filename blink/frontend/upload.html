<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Create Original Content</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .upload-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 24px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
        }
        .upload-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .upload-header h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .upload-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .upload-drop-zone {
            aspect-ratio: 16/9;
            border: 2px dashed var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.02);
        }
        .upload-drop-zone:hover, .upload-drop-zone.drag-active {
            border-color: var(--primary);
            background: rgba(var(--primary-rgb), 0.05);
        }
        .upload-drop-zone i {
            font-size: 40px;
            color: var(--primary);
            margin-bottom: 12px;
        }
        .upload-drop-zone p {
            font-size: 14px;
            font-weight: 600;
        }
        .upload-drop-zone span {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .preview-area {
            position: relative;
            margin-bottom: 24px;
            border-radius: 16px;
            overflow: hidden;
            display: none;
        }
        .preview-area video, .preview-area img {
            width: 100%;
            display: block;
        }
        .remove-preview {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        .form-select, .form-textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .form-textarea {
            height: 100px;
            resize: none;
        }

        .upload-submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: var(--primary);
            color: var(--bg);
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .upload-submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>

<body class="theme-dark">
    <div class="upload-container">
        <header class="upload-header">
            <h1>Create Content</h1>
            <p>Share your moments with the Blink community</p>
        </header>

        <form id="uploadForm">
            <input type="file" id="fileInput" class="hidden" accept="video/mp4,video/webm,image/jpeg,image/png,image/webp">
            
            <div id="uploadDropZone" class="upload-drop-zone">
                <i class="bi bi-cloud-arrow-up-fill"></i>
                <p>Click or drag media here</p>
                <span>MP4, WEBM, JPG, PNG (Max 100MB)</span>
            </div>

            <div id="previewArea" class="preview-area">
                <button type="button" class="remove-preview" id="removePreview"><i class="bi bi-x-lg"></i></button>
                <div id="mediaPlaceholder"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="uploadType">Content Type</label>
                <select id="uploadType" class="form-select">
                    <option value="reel">Reel (Short Video)</option>
                    <option value="post">Fixed Post (Photo/Video)</option>
                    <option value="story">Story (Lasts 24h)</option>
                </select>
            </div>

            <div class="form-group" id="moodGroup">
                <label class="form-label" for="moodSelect">Category / Mood</label>
                <select id="moodSelect" class="form-select">
                    <option value="General">General</option>
                    <option value="Gaming">Gaming</option>
                    <option value="Tech">Tech</option>
                    <option value="Aesthetic">Aesthetic</option>
                    <option value="Lifestyle">Lifestyle</option>
                    <option value="Music">Music</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="captionInput">Caption</label>
                <textarea id="captionInput" class="form-textarea" placeholder="Write something catchy... #viral #blink"></textarea>
            </div>

            <button type="submit" class="upload-submit-btn" id="submitBtn">
                <i class="bi bi-rocket-takeoff-fill"></i> Post Now
            </button>

            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="progressText" style="text-align:center;font-size:12px;margin-top:8px;color:var(--text-muted);display:none;">Uploading 0%</div>
        </form>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <a href="index.html"><i class="bi bi-house-door-fill"></i></a>
        <a href="messages.html"><i class="bi bi-chat-dots-fill"></i></a>
        <a href="upload.html" class="active"><i class="bi bi-plus-square-fill"></i></a>
        <a href="live.html"><i class="bi bi-broadcast"></i></a>
        <a href="profile.html"><i class="bi bi-person-circle-fill"></i></a>
    </nav>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
