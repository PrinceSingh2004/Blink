<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Blink | Pro Version</title>
    
    <!-- Icons & Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Design System -->
    <link rel="stylesheet" href="/css/v2_main.css">
    <base href="/">
</head>
<body>

    <div class="app-shell" id="appShell">
        
        <!-- SIDEBAR (Desktop) -->
        <aside class="sidebar">
            <div class="logo">
                <i class="bi bi-play-circle-fill"></i>
                <span>Blink</span>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="home">
                    <i class="bi bi-house-door-fill"></i>
                    <span>Home</span>
                </a>
                <a href="#" class="nav-item" data-page="explore">
                    <i class="bi bi-search"></i>
                    <span>Explore</span>
                </a>
                <a href="#" class="nav-item" data-page="create">
                    <i class="bi bi-plus-square"></i>
                    <span>Create</span>
                </a>
                <a href="#" class="nav-item" data-page="messages">
                    <i class="bi bi-chat-dots"></i>
                    <span>Messages</span>
                </a>
                <a href="#" class="nav-item" data-page="profile">
                    <i class="bi bi-person"></i>
                    <span>Profile</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="nav-item" id="logoutBtn">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- HEADER (Mobile) -->
        <header class="mobile-header">
            <div class="logo">Blink</div>
            <div class="mobile-actions">
                <i class="bi bi-bell"></i>
            </div>
        </header>

        <!-- MAIN STAGE -->
        <main class="main-stage">
            
            <!-- PAGE: REELS FEED -->
            <section id="home-page" class="page active">
                <div class="reels-scroll" id="reelsContainer">
                    <!-- Reels loaded dynamically by v2_feed.js -->
                </div>
            </section>

            <!-- PAGE: MESSAGES -->
            <section id="messages-page" class="page">
                <div class="messages-layout">
                    <!-- Messaging UI will go here -->
                </div>
            </section>

            <!-- PAGE: PROFILE -->
            <section id="profile-page" class="page">
                <div class="profile-section">
                    <div class="profile-avatar-wrap">
                        <img id="userAvatar" src="https://via.placeholder.com/150">
                        <input type="file" id="picUpload" hidden>
                    </div>
                    
                    <form class="auth-form active" style="width: 100%; max-width: 500px;">
                        <input type="text" id="profUsername" placeholder="Username">
                        <textarea id="profBio" placeholder="Bio"></textarea>
                        <button class="btn-primary">Update Profile</button>
                    </form>
                </div>
            </section>
        </main>

        <!-- BOTTOM NAV (Mobile) -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-page="home"><i class="bi bi-house-door-fill"></i></a>
            <a href="#" class="nav-item" data-page="explore"><i class="bi bi-search"></i></a>
            <a href="#" class="nav-item" data-page="create"><i class="bi bi-plus-square"></i></a>
            <a href="#" class="nav-item" data-page="messages"><i class="bi bi-chat-dots"></i></a>
            <a href="#" class="nav-item" data-page="profile"><i class="bi bi-person"></i></a>
        </nav>

    </div>

    <!-- AUTH OVERLAY -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <div class="logo">Blink</div>
            
            <div class="auth-tabs">
                <button class="btn-primary active" id="tabLogin">Login</button>
                <button class="btn-primary" id="tabSignup">Signup</button>
            </div>

            <form id="loginForm" class="auth-form active">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button class="btn-primary">Sign In</button>
            </form>

            <form id="signupForm" class="auth-form">
                <input type="text" placeholder="Username" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button class="btn-primary">Create Account</button>
            </form>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/v2_app.js"></script>

</body>
</html>
