<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Blink | Professional SPA</title>
    
    <!-- Icons & Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <base href="/">
</head>
<body>

    <div class="app-shell" id="appShell">
        
        <!-- SIDEBAR (Unified Fixed) -->
        <aside class="sidebar">
            <div class="logo"><i class="bi bi-play-circle-fill"></i><span>Blink</span></div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="home"><i class="bi bi-house-door-fill"></i><span>Home</span></a>
                <a href="#" class="nav-item" data-page="explore"><i class="bi bi-search"></i><span>Explore</span></a>
                <a href="#" class="nav-item" data-page="live"><i class="bi bi-broadcast"></i><span>Live</span></a>
                <button class="nav-item" data-page="profile"><i class="bi bi-person-fill"></i><span>Profile</span></button>
            </nav>
            <button class="nav-item" id="logoutBtn" style="margin-top:auto;"><i class="bi bi-box-arrow-right"></i><span>Logout</span></button>
        </aside>

        <!-- MAIN STAGE -->
        <main class="main-stage">
            
            <!-- PAGE: REELS FEED (Like Instagram) -->
            <section id="home-page" class="page active">
                <div class="reels-scroll" id="reelsContainer"></div>
            </section>

            <!-- PAGE: EXPLORE / SEARCH -->
            <section id="explore-page" class="page">
                <div class="explore-wrap">
                    <div class="search-bar">
                        <i class="bi bi-search"></i>
                        <input type="text" id="searchInput" placeholder="Find creators...">
                    </div>
                    <div class="explore-grid" id="exploreGrid"></div>
                </div>
            </section>

            <!-- PAGE: LIVE TRANSMISSION -->
            <section id="live-page" class="page">
                <div class="live-wrap">
                    <div class="live-box">
                        <video id="localVideo" playsinline muted></video>
                        <div class="live-indicator" id="liveTag">🔴 LIVE</div>
                    </div>
                    <div class="live-controls">
                        <button class="btn-primary" id="startLiveBtn">Start Stream</button>
                        <button class="btn-primary" id="endLiveBtn" style="display:none; background:red;">End Stream</button>
                    </div>
                </div>
            </section>

            <!-- PAGE: PROFILE -->
            <section id="profile-page" class="page">
                <div class="profile-view">
                    <div class="prof-header">
                        <img id="profPic" src="https://via.placeholder.com/150">
                        <h2 id="profUser">Creator</h2>
                        <p id="profBio">Blink Member Since 2024</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- BOTTOM NAV (Mobile) -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-page="home"><i class="bi bi-house-door-fill"></i></a>
            <a href="#" class="nav-item" data-page="explore"><i class="bi bi-search"></i></a>
            <a href="#" class="nav-item" data-page="live"><i class="bi bi-broadcast"></i></a>
            <a href="#" class="nav-item" data-page="profile"><i class="bi bi-person"></i></a>
        </nav>

    </div>

    <!-- AUTH OVERLAY (Centered Professionally) -->
    <div class="auth-overlay active" id="authModal">
        <div class="auth-card">
            <h1>Blink</h1>
            <div class="auth-tabs">
                <button class="btn-tab active" id="tabLogin">Login</button>
                <button class="btn-tab" id="tabSignup">Signup</button>
            </div>
            
            <form id="loginForm" class="auth-form active">
                <input type="email" id="logEmail" placeholder="Email" required>
                <input type="password" id="logPass" placeholder="Password" required>
                <button type="submit" class="btn-primary">Connect</button>
            </form>

            <form id="signupForm" class="auth-form">
                <input type="text" id="regUser" placeholder="Username" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPass" placeholder="Password" required>
                <button type="submit" class="btn-primary">Create Identity</button>
            </form>
        </div>
    </div>

    <!-- Global Toast / SDK -->
    <div id="toastContainer"></div>

    <!-- SCRIPTS (Monolith Rebuild) -->
    <script src="app.js"></script>
</body>
</html>
