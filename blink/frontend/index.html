<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Watch, Create, Share</title>
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/feed.css">
</head>

<body>

    <div class="app-container">
        
        <!-- ── SIDEBAR (Desktop) ─────────────────────── -->
        <aside class="sidebar">
            <div class="nav-logo" style="display:flex; align-items:center; gap:10px; margin-bottom: 24px; padding: 0 12px;">
                <h2 class="text-gradient" style="font-size: 28px; font-weight: 800;">Blink</h2>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-item active"><i class="bi bi-house"></i> Home</a>
                
                <div class="nav-item-container" style="position:relative;">
                    <div class="nav-item" id="navSearchTrigger"><i class="bi bi-search"></i> Search</div>
                    <div id="sidebarSearchWrapper" style="display:none; padding: 10px 0;">
                        <input type="text" id="searchInput" placeholder="Search..." class="search-input-fancy">
                        <div id="searchResults" class="search-results-dropdown"></div>
                    </div>
                </div>

                <a href="upload.html" class="nav-item"><i class="bi bi-plus-square"></i> Create</a>
                <a href="live.html" class="nav-item"><i class="bi bi-broadcast"></i> Live</a>
                <a href="messages.html" class="nav-item"><i class="bi bi-chat"></i> Messages</a>
                <a href="profile.html" class="nav-item"><i class="bi bi-person"></i> Profile</a>
            </nav>

            <div class="sidebar-footer" style="margin-top: auto;">
                <button id="logoutBtn" class="nav-item" style="border:none; background:none; width:100%; text-align:left;">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </div>
        </aside>

        <!-- ── MAIN FEED (Vertical Reels) ──────────────────── -->
        <main class="main-content">
            <div class="reels-container" id="reelsContainer"></div>
        </main>

        <!-- ── MOBILE NAVIGATION (Mobile) ─────────────────── -->
        <nav class="mobile-nav">
            <a href="index.html" class="nav-item active"><i class="bi bi-house"></i></a>
            <div class="nav-item" id="mobileSearchTrigger"><i class="bi bi-search"></i></div>
            <a href="upload.html" class="nav-item"><i class="bi bi-plus-square"></i></a>
            <a href="live.html" class="nav-item"><i class="bi bi-broadcast"></i></a>
            <a href="profile.html" class="nav-item"><i class="bi bi-person"></i></a>
        </nav>

    </div>

    <!-- ── COMMENT DRAWER ───────────────────────────────────── -->
    <div id="commentDrawer" class="comment-drawer">
        <div class="comment-header">Comments</div>
        <div id="commentList" class="comment-list"></div>
        <div class="comment-input-area">
            <input type="text" id="commentInput" placeholder="Add a comment..." class="input-modern">
            <button id="postCommentBtn" class="btn btn-primary btn-sm">Post</button>
        </div>
    </div>

    <!-- ── SEARCH OVERLAY ─────────────────────────────────── -->
    <div id="searchOverlay" class="modal-overlay" style="display:none; align-items: flex-start; padding-top: 40px;">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3>Search</h3>
                <button onclick="document.getElementById('searchOverlay').style.display='none';" class="btn-ghost"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal-form">
                <input type="text" id="searchInput" placeholder="Search for users or posts..." class="input-modern" style="width:100%;">
                <div id="searchResults" style="margin-top:15px; max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <!-- ── NOTIFICATIONS ─────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── SCRIPTS ────────────────────────────────────────────── -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/feed.js"></script>
</body>
</html>
