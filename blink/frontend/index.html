<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/feed.css">
</head>
<body class="theme-dark">

    <!-- TOP HEADER -->
    <header class="mobile-header">
        <div class="logo-text">Blink</div>
        <div class="header-actions">
            <a href="upload.html"><i class="bi bi-plus-square"></i></a>
            <a href="messages.html"><i class="bi bi-chat-dots"></i></a>
        </div>
    </header>

    <main class="app-main">
        <!-- STORIES ROW -->
        <div class="stories-container" id="storiesRow">
            <!-- Add Story -->
            <div class="story-bubble" id="addStoryBtn">
                <div class="story-avatar add-story">
                    <i class="bi bi-plus"></i>
                </div>
                <span>Your Story</span>
            </div>
            <div id="storiesList" style="display: flex; gap: 15px;"></div>
        </div>

        <!-- REELS FEED (Infinite Scroll) -->
        <div class="reels-feed" id="feedContainer">
            <!-- Videos injected here -->
        </div>

        <!-- SKELETON LOADER -->
        <div id="feedLoader" class="skeleton-loader hidden">
            <div class="sk-video"></div>
            <div class="sk-info">
                <div class="sk-text"></div>
                <div class="sk-text short"></div>
            </div>
        </div>
    </main>

    <!-- BOTTOM NAVIGATION (MOBILE) -->
    <nav class="bottom-nav">
        <a href="index.html" class="active"><i class="bi bi-house-door-fill"></i></a>
        <a href="explore.html"><i class="bi bi-search"></i></a>
        <a href="upload.html"><i class="bi bi-plus-square"></i></a>
        <a href="live.html"><i class="bi bi-broadcast"></i></a>
        <a href="profile.html"><i class="bi bi-person-circle"></i></a>
    </nav>

    <!-- HIDDEN INPUT FOR STORIES -->
    <input type="file" id="storyInput" accept="image/*,video/*" class="hidden">

    <!-- TOASTS -->
    <div id="toastContainer"></div>

    <script src="js/auth.js"></script>
    <script src="js/feed.js"></script>
</body>
</html>
