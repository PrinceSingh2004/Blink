<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Watch, Create, Share</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div class="app-container">
        
        <!-- ── SIDEBAR (Desktop / Tablet) ─────────────────────── -->
        <aside class="app-sidebar">
            <div class="nav-logo">
                <span class="text-gradient" style="font-size: 40px; font-weight: 900;">B</span>
                <h2 class="text-gradient">Blink</h2>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-link">
                    <i class="bi bi-house-door-fill"></i>
                    <span>Home</span>
                </a>
                <a href="live.html" class="nav-link">
                    <i class="bi bi-broadcast"></i>
                    <span>Live</span>
                </a>
                <a href="messages.html" class="nav-link">
                    <i class="bi bi-chat-dots-fill"></i>
                    <span>Messages</span>
                </a>
                <a href="upload.html" class="nav-link">
                    <i class="bi bi-plus-square-fill"></i>
                    <span>Create</span>
                </a>
                <a href="profile.html" class="nav-link" id="sidebarProfileLink">
                    <img id="sidebarAvatarImg" src="https://via.placeholder.com/32" class="avatar" style="width:32px; height:32px; border:2px solid var(--accent-primary);">
                    <span>Profile</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button id="logoutBtn" class="nav-link" style="width:100%; text-align:left; border:none; background:none;">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- ── MAIN FEED (Mobile First Reels) ──────────────────── -->
        <main class="main-content">
            <div class="reels-container" id="reelsContainer">
                <!-- Reels are dynamically injected here by feed.js -->
                <div class="flex-column flex-center" style="height: 100vh; gap: 20px;">
                    <div class="loader"></div>
                    <p style="color:var(--text-muted);">Syncing Blinks...</p>
                </div>
            </div>
        </main>

        <!-- ── BOTTOM NAVIGATION (Mobile Only) ─────────────────── -->
        <nav class="bottom-nav">
            <a href="index.html" class="bottom-link">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <a href="upload.html" class="bottom-link" style="transform: translateY(-2px);">
                <i class="bi bi-plus-square-fill" style="font-size: 32px; color: var(--text-primary);"></i>
            </a>
            <a href="messages.html" class="bottom-link">
                <i class="bi bi-chat-dots-fill"></i>
                <span>Chat</span>
            </a>
            <a href="profile.html" class="bottom-link">
                <img id="mobileAvatarImg" src="https://via.placeholder.com/24" class="avatar" style="width:24px; height:24px;">
                <span>Profile</span>
            </a>
        </nav>

    </div>

    <!-- ── NOTIFICATIONS ─────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── SCRIPTS ────────────────────────────────────────────── -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/feed.js"></script>
</body>
</html>
