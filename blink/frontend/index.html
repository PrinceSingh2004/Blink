<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Watch, Create, Share</title>
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/feed.css">
</head>

<body>

    <div class="app-container">
        
        <!-- ── SIDEBAR (Desktop) ─────────────────────── -->
        <aside class="app-sidebar">
            <div class="nav-logo">
                <span class="text-gradient" style="font-size: 32px;">B</span>
                <h2 class="text-gradient">Blink</h2>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-link active">
                    <i class="bi bi-house-door-fill"></i>
                    <span>Home</span>
                </a>
                <a href="upload.html" class="nav-link">
                    <i class="bi bi-plus-square"></i>
                    <span>Create</span>
                </a>

                <a href="messages.html" class="nav-link">
                    <i class="bi bi-chat-dots"></i>
                    <span>Messages</span>
                </a>
                <a href="profile.html" class="nav-link" id="sidebarProfileLink">
                    <img id="sidebarAvatarImg" src="https://via.placeholder.com/32" class="avatar" style="width:24px; height:24px;">
                    <span>Profile</span>
                </a>
            </nav>

            <div class="sidebar-footer" style="padding: 20px;">
                <button id="logoutBtn" class="nav-link w-full">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- ── MAIN FEED (Vertical Reels) ──────────────────── -->
        <main class="main-content">
            <div class="reels-container" id="reelsContainer">
                <!-- Reels are dynamically injected here by feed.js -->
                <div class="flex-center flex-col h-full gap-2">
                    <div class="loader"></div>
                    <p style="color:var(--text-muted); font-weight: 500;">Blink is syncing latest moments...</p>
                </div>
            </div>
        </main>

        <!-- ── BOTTOM NAVIGATION (Mobile) ─────────────────── -->
        <nav class="bottom-nav">
            <a href="index.html" class="bottom-link active">
                <i class="bi bi-house-door-fill"></i>
            </a>

            <a href="upload.html" class="bottom-link">
                <i class="bi bi-plus-square"></i>
            </a>
            <a href="messages.html" class="bottom-link">
                <i class="bi bi-chat-dots"></i>
            </a>
            <a href="profile.html" class="bottom-link">
                <img id="mobileAvatarImg" src="https://via.placeholder.com/24" class="avatar" style="width:24px; height:24px; border:none;">
            </a>
        </nav>

    </div>

    <!-- ── COMMENT DRAWER ───────────────────────────────────── -->
    <div id="commentDrawer" class="comment-drawer">
        <div class="comment-header">Comments</div>
        <div id="commentList" class="comment-list"></div>
        <div class="comment-input-area">
            <input type="text" id="commentInput" placeholder="Add a comment..." class="input-modern">
            <button id="postCommentBtn" class="btn btn-primary btn-sm">Post</button>
        </div>
    </div>

    <!-- ── NOTIFICATIONS ─────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── SCRIPTS ────────────────────────────────────────────── -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/feed.js"></script>
</body>
</html>
