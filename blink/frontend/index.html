<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Watch, Create, Share</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>

    <!-- ── SIDEBAR (Desktop) ─────────────────────────────────── -->
    <aside class="sidebar glass">
        <div class="sidebar-logo">
            <span class="gradient-text auth-logo">B</span>
            <h2 class="gradient-text">Blink</h2>
        </div>
        
        <nav class="nav-links">
            <a href="index.html" class="nav-link active">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <a href="messages.html" class="nav-link">
                <i class="bi bi-chat-dots-fill"></i>
                <span>Messages</span>
            </a>
            <a href="live.html" class="nav-link">
                <i class="bi bi-broadcast"></i>
                <span>Live</span>
            </a>
            <a href="upload.html" class="nav-link">
                <i class="bi bi-plus-square-fill"></i>
                <span>Create</span>
            </a>
            <a href="profile.html" class="nav-link" id="sidebarProfileLink">
                <div class="story-ring sidebar-avatar-wrap" style="width:32px;height:32px;">
                    <div id="sidebarAvatar" class="avatar" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#333;font-size:12px;">U</div>
                </div>
                <div style="display:flex;flex-direction:column;line-height:1.2;">
                    <span id="sidebarName">Profile</span>
                    <span id="sidebarHandle" style="font-size:11px;color:var(--text-muted);">@handle</span>
                </div>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button id="logoutBtn" class="nav-link" style="width:100%;text-align:left;">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- ── MAIN FEED AREA ────────────────────────────────────── -->
    <main class="reels-container" id="reelsContainer">
        <!-- REEL ITEMS INJECTED BY JS -->
        <div class="profile-error">
            <div class="loader" style="margin: 0 auto 20px;"></div>
            <p>Loading the latest Blinks...</p>
        </div>
    </main>

    <!-- ── BOTTOM NAV (Mobile) ────────────────────────────────── -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-link active">
            <i class="bi bi-house-door-fill"></i>
            <span>Home</span>
        </a>
        <a href="live.html" class="bottom-link">
            <i class="bi bi-broadcast"></i>
            <span>Live</span>
        </a>
        <a href="upload.html" class="bottom-link">
            <i class="bi bi-plus-square" style="font-size:28px;"></i>
        </a>
        <a href="messages.html" class="bottom-link">
            <i class="bi bi-chat-dots"></i>
            <span>Chat</span>
        </a>
        <a href="profile.html" class="bottom-link">
            <div id="topNavAvatar" class="avatar" style="width:24px;height:24px;background:#333;display:flex;align-items:center;justify-content:center;font-size:10px;">U</div>
            <span>Profile</span>
        </a>
    </nav>

    <!-- ── NOTIFICATIONS ─────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── SCRIPTS ────────────────────────────────────────────── -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/feed.js"></script>
</body>
</html>
