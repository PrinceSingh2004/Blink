<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blink | Go Live</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .live-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .overlay { position: absolute; z-index: 10; width: 100%; padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; top: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .bottom-panel { position: absolute; z-index: 10; width: 100%; padding: 30px; box-sizing: border-box; display: flex; justify-content: center; bottom: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
        
        button { cursor: pointer; padding: 12px 24px; font-weight: bold; border-radius: 8px; border: none; font-size: 16px; transition: all 0.2s; }
        #goLiveBtn { background: #ff2d6e; color: white; box-shadow: 0 0 15px rgba(255, 45, 110, 0.6); }
        #goLiveBtn:hover { transform: scale(1.05); }
        #endStreamBtn { background: #333; color: white; display: none; margin-left:10px; }
        #endStreamBtn:hover { background: #555; }
        
        .stats { background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; font-size: 14px; backdrop-filter: blur(5px); }
        
        /* Debug Panel */
        #debugPanel { position: absolute; top: 70px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; font-size: 12px; font-family: monospace; z-index: 20; max-width: 300px; display: none; }
        .debug-row { margin-bottom: 5px; display: flex; justify-content: space-between; }
        .debug-label { color: #888; }
        .debug-value { color: #0f0; }
    </style>
</head>
<body>

<div class="live-container">
    <!-- Local video must have muted, autoplay, playsinline -->
    <video id="localVideo" muted autoplay playsinline></video>
    
    <div class="overlay">
        <div class="stats">
            🔴 <span id="statusIndicator">Ready</span> | 👁️ <span id="viewerCount">0</span>
        </div>
        <div>
            <span id="qualityIndicator">Quality: detecting...</span>
        </div>
    </div>
    
    <!-- Dev Debug Panel -->
    <div id="debugPanel">
        <div style="text-align:center; font-weight:bold; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:5px;">WebRTC Diagnostics</div>
        <div id="debugContent"></div>
    </div>

    <div class="bottom-panel">
        <button id="goLiveBtn">Go Live</button>
        <button id="endStreamBtn">End Stream</button>
        <button onclick="document.getElementById('debugPanel').style.display = document.getElementById('debugPanel').style.display === 'none' ? 'block' : 'none'" style="background:transparent; border:1px solid #555; color:#888; margin-left:10px; font-size:12px;">Debug</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/stream.js"></script>
<script>
    // Initialize exactly as broadcaster
    document.addEventListener('DOMContentLoaded', () => {
        window.LiveStreaming.initBroadcaster('test-room-123');
    });
</script>
</body>
</html>
