<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blink</title>
<style>
  body { margin:0; background:#0a0a0f; display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; font-family:sans-serif; }
  .logo { width:72px; height:72px; background:linear-gradient(135deg,#ff2d78,#7b5ea7,#00d4ff); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:36px; font-weight:900; color:#fff; margin-bottom:20px; animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:.9} }
  p { color:#666; font-size:14px; letter-spacing:.05em; }
</style>
</head>
<body>
<div class="logo">B</div>
<p>Loading Blink…</p>
<script>
  // Smart redirect: send to feed if logged in, else login page
  const token = localStorage.getItem('blink_token');
  if (token) {
    // Verify token is still valid before redirecting
    fetch('/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => {
      if (r.ok) {
        window.location.replace('/pages/index.html');
      } else {
        localStorage.removeItem('blink_token');
        localStorage.removeItem('blink_user');
        window.location.replace('/pages/login.html');
      }
    }).catch(() => {
      window.location.replace('/pages/login.html');
    });
  } else {
    window.location.replace('/pages/login.html');
  }
</script>
</body>
</html>
