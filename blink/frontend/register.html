<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Join Creators</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <style>
        .auth-split { display: flex; min-height: 100vh; width: 100%; }
        .auth-side-visual {
            flex: 1.2;
            background: radial-gradient(circle at center, #1a1012 0%, #000 100%);
            display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; overflow: hidden;
        }
        .auth-side-visual::before {
            content: ''; position: absolute; width:150%; height:150%; background: linear-gradient(135deg, #ff0050 0%, #00f2ea 100%); opacity: 0.1; animation: spin 30s linear infinite;
        }
        .auth-side-content { position: relative; z-index: 5; text-align: center; }
        .auth-side-logo { font-size: 80px; font-weight: 900; margin-bottom: 20px; display: block; }
        .auth-side-tagline { font-size: 24px; font-weight: 300; color: var(--text-secondary); max-width: 440px; }
        .auth-side-form { flex: 1; display: flex; align-items: center; justify-content: center; background: var(--bg-main); padding: 40px; }
        @media (max-width: 992px) { .auth-side-visual { display: none; } .auth-side-form { padding: 20px; } }
    </style>
</head>

<body>

    <div class="auth-split animate-fade-in">
        
        <!-- LEFT: VISUAL (REGISTER VERSION) -->
        <div class="auth-side-visual">
            <div class="auth-side-content">
                <span class="gradient-text auth-side-logo">B</span>
                <p class="auth-side-tagline">Start your journey as a Blink creator. Showcase your cinematic world to millions.</p>
                <div class="profile-stats" style="justify-content:center;margin-top:40px;gap:60px;">
                    <div class="stat-item"><span class="stat-value">Instant</span> Reach</div>
                    <div class="stat-item"><span class="stat-value">24/7</span> Discovery</div>
                </div>
            </div>
        </div>

        <!-- RIGHT: FORM -->
        <div class="auth-side-form">
            <div class="auth-card glass">
                <div class="auth-header">
                    <span class="gradient-text auth-logo">Join Blink</span>
                    <h2 style="font-size:28px;font-weight:700;margin-top:20px;">Ready to go viral? ✨</h2>
                    <p class="auth-subtitle">Create your account and start sharing.</p>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <div class="input-wrap">
                            <span class="input-icon"><i class="bi bi-at" style="font-size:20px;"></i></span>
                            <input type="text" name="username" class="form-input" placeholder="Choose a handle (e.g. blink_star)" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <div class="input-wrap">
                            <span class="input-icon"><i class="bi bi-envelope-at-fill"></i></span>
                            <input type="email" name="email" class="form-input" placeholder="Your best email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrap">
                            <span class="input-icon"><i class="bi bi-shield-lock-fill"></i></span>
                            <input type="password" name="password" id="password" class="form-input" placeholder="At least 6 characters" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-wrap">
                            <span class="input-icon"><i class="bi bi-shield-check"></i></span>
                            <input type="password" name="confirmPassword" id="confirmPassword" class="form-input" placeholder="Repeat your password" required>
                        </div>
                    </div>

                    <p style="font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:20px;">
                        By creating an account, you agree to our <a href="#" style="color:white;text-decoration:underline;">Terms</a> and <a href="#" style="color:white;text-decoration:underline;">Privacy Policy</a>.
                    </p>

                    <button type="submit" class="btn btn-primary" id="registerBtn" style="width:100%;height:52px;font-size:16px;">
                        Create Account <i class="bi bi-stars"></i>
                    </button>
                    
                    <div class="auth-divider" style="text-align:center;margin:30px 0;position:relative;">
                        <span style="background:var(--bg-surface);padding:0 10px;color:var(--text-muted);font-size:12px;text-transform:uppercase;letter-spacing:1px;position:relative;z-index:2;">or</span>
                        <div style="position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,0.1);z-index:1;"></div>
                    </div>

                    <p style="text-align:center;color:var(--text-secondary);font-size:14px;">
                        Already on Blink? <a href="login.html" style="color:var(--accent-primary);font-weight:700;">Sign In</a>
                    </p>
                </form>
            </div>
        </div>

    </div>

    <!-- NOTIFICATIONS -->
    <div id="toastContainer"></div>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
