<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Join Creators</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <div class="auth-page">
        <!-- LEFT: VISUAL (Desktop) -->
        <div class="auth-visual">
            <div class="auth-brand animate-slide-up">
                <span class="text-gradient auth-brand-logo" style="font-size:120px; font-weight:900;">B</span>
                <h1 class="text-gradient" style="margin-top:-20px; margin-bottom:20px;">Blink</h1>
                <p class="auth-tagline">Start your journey as a Blink creator. Showcase your cinematic world to millions.</p>
                
                <div class="flex-column gap-md" style="margin-top:60px; width:100%; max-width:360px;">
                    <div class="glass flex-items-center gap-md" style="padding:16px; border-radius:16px;">
                        <i class="bi bi-stars" style="font-size:24px; color:var(--accent-secondary);"></i>
                        <span style="font-size:14px; font-weight:500;">High performance streaming</span>
                    </div>
                    <div class="glass flex-items-center gap-md" style="padding:16px; border-radius:16px;">
                        <i class="bi bi-shield-check" style="font-size:24px; color:var(--accent-primary);"></i>
                        <span style="font-size:14px; font-weight:500;">Safe & encrypted ecosystem</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT: FORM (Responsive) -->
        <div class="auth-form-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Join Blink</h2>
                    <p>Create your creator account today</p>
                </div>

                <!-- Styled Alert Component -->
                <div id="registerAlert" class="auth-alert"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <div class="input-wrap">
                            <input type="text" name="username" class="form-input" placeholder="e.g. blink_star" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrap">
                            <input type="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrap">
                            <input type="password" name="password" id="password" class="form-input" placeholder="Min. 6 characters" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-wrap">
                            <input type="password" name="confirmPassword" id="confirmPassword" class="form-input" placeholder="Repeat password" required>
                        </div>
                    </div>

                    <p style="font-size:11px; color:var(--text-muted); text-align:center; margin:20px 0;">
                        By joining, you agree to our <a href="#" style="color:var(--text-secondary);">Terms</a> and <a href="#" style="color:var(--text-secondary);">Privacy Policy</a>.
                    </p>

                    <button type="submit" class="btn btn-primary auth-submit-btn" id="registerBtn">
                        Create Account <i class="bi bi-person-plus"></i>
                    </button>
                    
                    <div class="auth-switch">
                        <p>Already a member? <a href="login.html">Sign In</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
