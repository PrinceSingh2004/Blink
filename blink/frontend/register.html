<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Register | Blink Universe</title>
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <div class="auth-container">
        
        <div class="auth-card">
            <header class="auth-header">
                <span class="auth-logo text-gradient">B</span>
                <h1 class="auth-title">Create account</h1>
                <p class="auth-subtitle">Join the Blink community and share your moments.</p>
            </header>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrap">
                        <input type="text" name="username" class="form-input" placeholder="Choose a unique handle" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrap">
                        <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <input type="password" name="password" class="form-input" placeholder="Create a strong secret" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-wrap">
                        <input type="password" name="confirmPassword" class="form-input" placeholder="Repeat your secret" required>
                    </div>
                </div>

                <button type="submit" id="registerBtn" class="btn btn-primary" style="height: 52px; font-size: 16px;">
                    Create my account
                </button>
            </form>

            <footer class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Sign In</a>
            </footer>
        </div>

    </div>

    <!-- ── NOTIFICATIONS ─────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── SCRIPTS ────────────────────────────────────────────── -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
