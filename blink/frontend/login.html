<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Sign In</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <div class="auth-page">
        <!-- LEFT: VISUAL (Desktop) -->
        <div class="auth-visual">
            <div class="auth-brand animate-slide-up">
                <span class="text-gradient auth-brand-logo" style="font-size:120px; font-weight:900;">B</span>
                <h1 class="text-gradient" style="margin-top:-20px; margin-bottom:20px;">Blink</h1>
                <p class="auth-tagline">Reimagine your world. Sharing cinematic stories at the speed of thought.</p>
                <div class="flex-center gap-lg" style="margin-top:60px;">
                    <div class="flex-column flex-center gap-xs">
                        <span style="font-size:24px; font-weight:800; color:var(--accent-secondary);">24M+</span>
                        <span style="font-size:12px; color:var(--text-muted); text-transform:uppercase;">Views Daily</span>
                    </div>
                    <div style="height:40px; width:1px; background:rgba(255,255,255,0.1);"></div>
                    <div class="flex-column flex-center gap-xs">
                        <span style="font-size:24px; font-weight:800; color:var(--accent-primary);">100K+</span>
                        <span style="font-size:12px; color:var(--text-muted); text-transform:uppercase;">Creators</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT: FORM (Responsive) -->
        <div class="auth-form-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Enter your credentials to continue</p>
                </div>

                <!-- Styled Alert Component -->
                <div id="loginAlert" class="auth-alert"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrap">
                            <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrap">
                            <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                        </div>
                    </div>

                    <p style="text-align:right; font-size:12px; margin-bottom:20px;">
                        <a href="forgot-password.html" style="color:var(--text-muted);">Forgot password?</a>
                    </p>

                    <button type="submit" class="btn btn-primary auth-submit-btn" id="loginBtn">
                        Sign In <i class="bi bi-arrow-right"></i>
                    </button>
                    
                    <div class="auth-switch">
                        <p>Join the movement? <a href="register.html">Create an Account</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const alert = document.getElementById('loginAlert');

            // Reset Alert
            alert.style.display = 'none';
            alert.textContent = '';
            alert.className = 'auth-alert';

            // Disable Button & Spinner
            btn.disabled = true;
            btn.innerHTML = '<div class="loader" style="width:20px;height:20px;"></div> <span>Signing In...</span>';

            try {
                const res = await fetch(window.BlinkConfig.API_BASE + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Invalid credentials.');
                }

                // Success
                localStorage.setItem('blink_token', data.token);
                localStorage.setItem('blink_user', JSON.stringify(data.user));
                window.location.href = 'index.html';

            } catch (err) {
                // Show Styled Alert instead of Toast
                alert.textContent = err.message;
                alert.style.display = 'block';
                alert.classList.add('error');
                
                // Re-enable button
                btn.disabled = false;
                btn.innerHTML = 'Sign In <i class="bi bi-arrow-right"></i>';
            }
        });
    </script>
</body>
</html>
