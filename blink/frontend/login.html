<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login | Blink</title>
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card animate-up">
            <header class="auth-header">
                <span class="logo text-6xl text-gradient">B</span>
                <h1 class="auth-title mt-4">Welcome back</h1>
                <p class="auth-subtitle">Sign in to share your moments</p>
            </header>

            <form id="loginForm" class="auth-form mt-8 flex-col gap-6">
                <div class="input-group">
                    <label class="text-sm font-600 mb-2 block">Username or Email</label>
                    <input type="text" name="identifier" class="input-field w-full" placeholder="Enter your identity" required>
                </div>

                <div class="input-group">
                    <label class="text-sm font-600 mb-2 block">Password</label>
                    <input type="password" name="password" class="input-field w-full" placeholder="Enter your secret" required>
                </div>

                <div id="loginAlert" class="auth-alert"></div>

                <button type="submit" id="loginBtn" class="btn btn-primary w-full h-14 text-lg">
                    Sign In
                </button>
            </form>

            <footer class="auth-footer mt-8">
                Don't have an account? <a href="register.html" class="auth-link">Create one</a>
            </footer>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
