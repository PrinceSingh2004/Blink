<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: #050505;
            padding: 20px;
        }
        
        .auth-container {
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.5s ease;
        }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
        .auth-header p { color: var(--text-muted); font-size: 14px; }

        .auth-alert {
            display: none;
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff3b30;
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .form-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 14px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 16px;
            transition: var(--transition);
        }
        .form-input:focus { border-color: var(--accent-primary); outline: none; box-shadow: 0 0 0 2px rgba(0, 242, 254, 0.2); }

        .btn-submit {
            width: 100%;
            height: 50px;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
        }
        
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted); }
        .auth-footer a { color: var(--accent-primary); text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body class="theme-dark">

    <div class="auth-page">
        <div style="margin-bottom: 30px; text-align: center;">
            <div class="auth-logo gradient-text" style="font-size: 48px; margin-bottom: 10px;">B</div>
            <h2 class="gradient-text" style="font-size: 24px;">Blink Universe</h2>
        </div>

        <div class="auth-container">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to continue your journey</p>
            </div>

            <!-- Styled Alert Component (Task 1 UI Fix) -->
            <div id="loginAlert" class="auth-alert"></div>

            <form id="loginForm">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">

                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">

                <button type="submit" class="btn btn-primary btn-submit" id="loginBtn">
                    <span>Sign In</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>New to Blink? <a href="register.html">Create an account</a></p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const alert = document.getElementById('loginAlert');

            // Reset Alert
            alert.style.display = 'none';
            alert.textContent = '';

            // Disable Button & Spinner
            btn.disabled = true;
            btn.innerHTML = '<div class="loader" style="width:20px;height:20px;"></div> <span>Authenticating...</span>';

            try {
                const res = await fetch(window.BlinkConfig.API_BASE + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Invalid credentials.');
                }

                // Success
                localStorage.setItem('blink_token', data.token);
                localStorage.setItem('blink_user', JSON.stringify(data.user));
                window.location.href = 'index.html';

            } catch (err) {
                // Show Styled Alert instead of Toast
                alert.textContent = err.message;
                alert.style.display = 'block';
                
                // Re-enable button
                btn.disabled = false;
                btn.innerHTML = '<span>Sign In</span>';
            }
        });
    </script>
</body>
</html>
