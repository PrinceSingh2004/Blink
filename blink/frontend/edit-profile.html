<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blink | Edit Profile</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link  href="https://unpkg.com/cropperjs/dist/cropper.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/profile.css">
</head>
<body>
<div class="app-layout">

  <!-- SIDEBAR -->
  <nav class="sidebar" role="navigation">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
      <a href="index.html" class="logo-container" style="margin-bottom: 0;">
        <div class="logo-icon">B</div><span class="logo-text">Blink</span>
      </a>
      <button id="themeToggle" title="Toggle Theme">🌙</button>
    </div>
    <ul class="nav-links">
      <li class="nav-item"><a href="index.html"><i class="bi bi-house-fill nav-icon"></i><span class="nav-text">Home</span></a></li>
      <li class="nav-item"><a href="upload.html"><i class="bi bi-upload nav-icon"></i><span class="nav-text">Upload</span></a></li>
      <li class="nav-item"><a href="messages.html"><i class="bi bi-chat-dots-fill nav-icon"></i><span class="nav-text">Messages</span></a></li>
      <li class="nav-item"><a href="live.html"><i class="bi bi-broadcast nav-icon"></i><span class="nav-text">Live</span></a></li>
      <li class="nav-item"><a href="profile.html" class="active"><i class="bi bi-person-circle nav-icon"></i><span class="nav-text">Profile</span></a></li>
    </ul>
    <div class="sidebar-user" onclick="window.location.href='profile.html'">
      <div class="sidebar-avatar" id="sidebarAvatar"></div>
      <div class="sidebar-info">
        <div class="sidebar-name" id="sidebarName">Loading...</div>
        <div class="sidebar-handle" id="sidebarHandle"></div>
      </div>
    </div>
  </nav>

  <main class="main-content page-scrollable">
    <div class="edit-profile-wrap">
      <div style="margin-bottom: 24px;">
        <a href="profile.html" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left icon-inline"></i> Back</a>
      </div>
      <h1 class="page-title">Edit Profile</h1>

      <section class="avatar-upload-area">
        <div class="avatar-preview" id="editAvatarPreview">
            <img id="currentAvatar" src="" style="display:none" class="profile-preview-img">
            <!-- Alias for user requested script -->
            <img id="profileImg" src="" style="display:none">

            <span id="initials">?</span>
        </div>
        <div class="avatar-upload-info">
          <h4>Profile Photo</h4>
          <p>JPG, PNG or WEBP. Max 2MB.</p>
          <input type="file" id="avatarInput" accept="image/*" style="display:none">
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button class="btn btn-secondary btn-sm" onclick="document.getElementById('avatarInput').value='';document.getElementById('avatarInput').click()">Change Photo</button>
            <button class="btn btn-danger btn-sm" id="removeAvatarBtn" style="background:#ff4d4d15; color:#ff4d4d; border:1px solid #ff4d4d30;">Remove</button>
          </div>
        </div>
      </section>

      <form class="edit-form" id="editProfileForm">
        <div class="form-group" style="margin-bottom: 24px;">
          <label class="form-label" style="display:block; margin-bottom: 8px; font-weight: 600;">Username</label>
          <input type="text" id="editUsername" class="form-input" style="width:100%; height:48px; padding:0 16px; border-radius:12px;" required placeholder="Choose a username">
        </div>

        <div class="form-group" style="margin-bottom: 32px;">
          <label class="form-label" style="display:block; margin-bottom: 8px; font-weight: 600;">Bio</label>
          <textarea id="editBio" class="form-input" style="width:100%; height:100px; padding:12px 16px; border-radius:12px; resize:none;" placeholder="Tell us about yourself..."></textarea>
        </div>

        <div style="display:flex; gap:16px;">
            <button type="submit" class="btn btn-primary" id="saveProfileBtn" style="flex:1; height:48px;">Save Changes</button>
            <button type="button" class="btn btn-secondary" id="cancelBtn" onclick="window.location.href='profile.html'" style="flex:1; height:48px;">Cancel</button>
        </div>
      </form>
    </div>
  </main>
</div>

<!-- Cropping Modal -->
<div class="modal-backdrop" id="cropModal" style="display:none">
  <div class="modal" style="max-width:480px; padding: 24px;">
    <h3 class="modal-title" style="margin-bottom: 16px;">Crop Photo</h3>
    <div style="height:320px; background:#000; margin:20px 0; border-radius:12px; overflow:hidden;">
      <img id="cropperImg" style="max-width:100%;">
    </div>
    <div style="display:flex; gap:12px;">
      <button class="btn btn-primary" id="confirmCropBtn" style="flex:1">Apply</button>
      <button class="btn btn-secondary" id="cancelCropBtn" style="flex:1">Cancel</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>
<script src="https://unpkg.com/cropperjs/dist/cropper.js"></script>
<script src="js/auth.js"></script>
<script src="js/edit-profile.js"></script>
</body>
</html>
