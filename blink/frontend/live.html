<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Live Stream</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .live-layout { padding: 80px 16px 100px; }
        .live-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .live-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        .live-card { background: var(--glass); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .live-card img { width: 100%; aspect-ratio: 9/16; object-fit: cover; }
        .live-badge { position: absolute; top: 10px; left: 10px; background: #ff0050; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; }
        .live-info { padding: 10px; text-align: center; }

        .stream-view-container { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; }
        .video-wrap { flex: 1; position: relative; background: #111; display: flex; align-items: center; justify-content: center; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        .stream-overlay { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .live-tag { background: #ff0050; color: #fff; padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 12px; }
        .btn-close { background: rgba(0,0,0,0.5); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        .chat-section { height: 35vh; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 16px; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
        .chat-msg { font-size: 14px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .chat-msg b { color: var(--primary); margin-right: 6px; }
        .chat-input-wrap { display: flex; gap: 10px; }
        .chat-input-wrap input { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 10px 16px; color: #fff; outline: none; }
        .chat-input-wrap button { background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 50%; color: #000; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body class="theme-dark">

    <div class="live-layout">
        <header class="live-header">
            <h1 class="logo-text">Live</h1>
            <button class="btn btn-primary" id="startLiveBtn"><i class="bi bi-camera-video-fill"></i> Go Live</button>
        </header>

        <div id="liveDiscovery">
            <div id="liveList" class="live-grid"></div>
            <div id="noStreams" class="no-live hidden" style="text-align:center; padding:100px 0; color:var(--text-muted);">
                <i class="bi bi-broadcast" style="font-size:48px;"></i>
                <p>No one is live right now.</p>
            </div>
        </div>

        <!-- PLAYER & CHAT MODAL -->
        <div id="streamPlayerContainer" class="stream-view-container hidden">
            <div class="video-wrap">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="stream-overlay">
                    <div class="live-tag">LIVE <span id="viewerCount">0</span></div>
                    <button class="btn-close" id="leaveBtn"><i class="bi bi-x-lg"></i></button>
                </div>
            </div>
            
            <div class="chat-section">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-wrap">
                    <input type="text" id="chatInput" placeholder="Join the conversation...">
                    <button id="sendLiveMsgBtn"><i class="bi bi-send-fill"></i></button>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html"><i class="bi bi-house-door"></i></a>
        <a href="explore.html"><i class="bi bi-search"></i></a>
        <a href="upload.html"><i class="bi bi-plus-square"></i></a>
        <a href="live.html" class="active"><i class="bi bi-broadcast-pin"></i></a>
        <a href="profile.html"><i class="bi bi-person-circle"></i></a>
    </nav>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/live.js"></script>
</body>
</html>
