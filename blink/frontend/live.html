<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Live | Blink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <style>
        .live-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        #localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .live-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.6) 100%);
        }
        .live-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }
        .live-badge {
            background: #ff0050;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .viewer-count {
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 14px;
        }
        .chat-container {
            height: 300px;
            overflow-y: auto;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            mask-image: linear-gradient(to top, black 80%, transparent 100%);
        }
        .chat-msg {
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            max-width: 80%;
            width: fit-content;
        }
        .chat-msg b { color: var(--primary); margin-right: 6px; }
        .live-controls {
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        #chatInput {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 10px 20px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="live-container">
        <video id="localVideo" autoplay muted playsinline></video>
        
        <div class="live-overlay">
            <div class="live-header">
                <div class="live-badge">🔴 LIVE</div>
                <div class="viewer-count" id="viewerCount">👁️ 0</div>
                <button class="btn btn-secondary btn-sm" id="endStreamBtn" style="display:none;">End Pulse</button>
            </div>

            <div class="live-footer">
                <div id="chatBox" class="chat-container"></div>
                
                <div class="live-controls">
                    <input type="text" id="chatInput" placeholder="Say something...">
                    <button class="btn btn-primary" id="startBtn">Go Live</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Required Libraries -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/live.js"></script>
</body>
</html>
