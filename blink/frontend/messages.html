<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Direct Messages</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div class="app-container">
        
        <!-- ── SIDEBAR (Desktop / Tablet) ─────────────────────── -->
        <aside class="app-sidebar">
            <div class="nav-logo">
                <span class="text-gradient" style="font-size: 40px; font-weight: 900;">B</span>
                <h2 class="text-gradient">Blink</h2>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-link">
                    <i class="bi bi-house-door-fill"></i>
                    <span>Home</span>
                </a>
                <a href="live.html" class="nav-link">
                    <i class="bi bi-broadcast"></i>
                    <span>Live</span>
                </a>
                <a href="messages.html" class="nav-link active">
                    <i class="bi bi-chat-dots-fill"></i>
                    <span>Messages</span>
                </a>
                <a href="upload.html" class="nav-link">
                    <i class="bi bi-plus-square-fill"></i>
                    <span>Create</span>
                </a>
                <a href="profile.html" class="nav-link" id="sidebarProfileLink">
                    <img id="sidebarAvatarImg" src="https://via.placeholder.com/32" class="avatar" style="width:32px; height:32px; border:2px solid var(--accent-primary);">
                    <span>Profile</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button id="logoutBtn" class="nav-link" style="width:100%; text-align:left; border:none; background:none;">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- ── MESSAGES CONTENT AREA ────────────────────────────── -->
        <main class="main-content flex" style="background: var(--bg-main); height: 100vh; overflow: hidden;">
            
            <!-- LIST SIDE -->
            <section id="chatList" class="flex-column" style="width: 380px; border-right: 1px solid rgba(255,255,255,0.05); min-width: 320px;">
                <div class="flex-between" style="padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <h2 style="font-size: 24px;">Messages</h2>
                    <button class="btn-icon"><i class="bi bi-pencil-square"></i></button>
                </div>
                
                <div id="conversationContainer" class="flex-column" style="flex: 1; overflow-y: auto;">
                    <!-- Dynamically Injected -->
                    <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                        <div class="loader" style="margin: 0 auto 10px;"></div>
                        <span>Syncing chats...</span>
                    </div>
                </div>
            </section>

            <!-- THREAD SIDE -->
            <section id="chatThread" class="flex-column" style="flex: 1; background: var(--bg-surface);">
                
                <!-- THREAD HEADER -->
                <div id="threadHeader" class="flex-items-center gap-md" style="padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.05); background: var(--bg-surface); display: none;">
                    <button id="backBtn" class="show-mobile-only btn-icon" style="margin-right: 8px;"><i class="bi bi-chevron-left"></i></button>
                    <img id="threadAvatar" src="https://via.placeholder.com/44" class="avatar" style="width: 44px; height: 44px;">
                    <div>
                        <div id="threadName" style="font-weight: 800;">Username</div>
                        <div id="threadStatus" style="font-size: 11px; color: var(--success);">Online</div>
                    </div>
                </div>

                <!-- MESSAGES AREA -->
                <div id="messagesArea" class="flex-column gap-md" style="flex: 1; padding: 24px; overflow-y: auto;">
                    <div class="flex-column flex-center" style="height: 100%; color: var(--text-muted); opacity: 0.5;">
                        <i class="bi bi-chat-heart" style="font-size: 80px; margin-bottom: 20px;"></i>
                        <h3>Your private universe</h3>
                        <p>End-to-end encrypted messaging.</p>
                    </div>
                </div>

                <!-- INPUT AREA -->
                <div id="inputArea" class="flex-items-center gap-md" style="padding: 20px 24px; border-top: 1px solid rgba(255,255,255,0.05); background: var(--bg-surface); display: none;">
                    <button class="btn-icon"><i class="bi bi-emoji-smile" style="font-size: 24px;"></i></button>
                    <input type="text" id="chatInput" class="form-input" style="border-radius: 30px; height: 50px; background: var(--bg-input);" placeholder="Message...">
                    <button id="sendBtn" class="btn btn-primary" style="height: 50px; border-radius: 30px; padding: 0 24px;">Send</button>
                </div>

            </section>

        </main>

        <!-- ── BOTTOM NAVIGATION (Mobile Only) ─────────────────── -->
        <nav class="bottom-nav">
            <a href="index.html" class="bottom-link">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <a href="upload.html" class="bottom-link">
                <i class="bi bi-plus-square-fill" style="font-size: 32px; color: var(--text-primary);"></i>
            </a>
            <a href="messages.html" class="bottom-link active">
                <i class="bi bi-chat-dots-fill"></i>
                <span>Chat</span>
            </a>
            <a href="profile.html" class="bottom-link">
                <img id="mobileAvatarImg" src="https://via.placeholder.com/24" class="avatar" style="width:24px; height:24px;">
                <span>Profile</span>
            </a>
        </nav>

    </div>

    <!-- ── NOTIFICATIONS ─────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── SCRIPTS ────────────────────────────────────────────── -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/messages.js"></script>
</body>
</html>
