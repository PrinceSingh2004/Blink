<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Direct Messages</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div class="app-container">
        
        <!-- ── SIDEBAR (Desktop / Tablet) ─────────────────────── -->
        <aside class="app-sidebar">
            <div class="nav-logo">
                <span class="text-gradient" style="font-size: 40px; font-weight: 900;">B</span>
                <h2 class="text-gradient">Blink</h2>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-link">
                    <i class="bi bi-house-door-fill"></i>
                    <span>Home</span>
                </a>
                <a href="live.html" class="nav-link">
                    <i class="bi bi-broadcast"></i>
                    <span>Live</span>
                </a>
                <a href="messages.html" class="nav-link active">
                    <i class="bi bi-chat-dots-fill"></i>
                    <span>Messages</span>
                </a>
                <a href="upload.html" class="nav-link">
                    <i class="bi bi-plus-square-fill"></i>
                    <span>Create</span>
                </a>
                <a href="profile.html" class="nav-link" id="sidebarProfileLink">
                    <img id="sidebarAvatarImg" src="https://via.placeholder.com/32" class="avatar" style="width:32px; height:32px; border:2px solid var(--accent-primary);">
                    <span>Profile</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button id="logoutBtn" class="nav-link" style="width:100%; text-align:left; border:none; background:none;">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- ── MESSAGES CONTENT AREA ────────────────────────────── -->
        <main class="main-content flex">
            
            <div class="messenger-container">
                <!-- LIST SIDE -->
                <section id="chatList" class="chat-sidebar active">
                    <div class="chat-header">
                        <h2>Messages</h2>
                        <button class="btn-circle btn-secondary"><i class="bi bi-pencil-square"></i></button>
                    </div>
                    
                    <div id="conversationContainer" class="conversation-list">
                        <!-- Dynamically Injected -->
                        <div class="flex-center" style="padding: 40px; color: var(--text-muted);">
                            <div class="spinner-sm"></div>
                            <span style="margin-left: 10px;">Syncing Universe...</span>
                        </div>
                    </div>
                </section>

                <!-- THREAD SIDE -->
                <section id="chatThread" class="chat-main">
                    
                    <!-- THREAD HEADER -->
                    <div id="threadHeader" class="thread-header" style="display: none;">
                        <button id="backBtn" class="show-mobile-only btn btn-ghost btn-circle"><i class="bi bi-chevron-left" style="font-size: 20px;"></i></button>
                        <div id="threadAvatar" class="avatar" style="width: 44px; height: 44px;"></div>
                        <div class="flex-col">
                            <div id="threadName" style="font-weight: 800; font-size: 16px;">Username</div>
                            <div id="threadStatus" style="font-size: 11px; color: var(--primary);">Active now</div>
                        </div>
                    </div>

                    <!-- MESSAGES AREA -->
                    <div id="messagesArea" class="messages-area">
                        <div class="empty-chat">
                            <i class="bi bi-chat-heart"></i>
                            <h3>Your private universe</h3>
                            <p>End-to-end encrypted messaging. Keep it Blink.</p>
                        </div>
                    </div>

                    <!-- INPUT AREA -->
                    <div id="inputArea" class="chat-input-area" style="display: none;">
                        <button class="btn btn-ghost btn-circle"><i class="bi bi-emoji-smile" style="font-size: 24px;"></i></button>
                        <input type="text" id="chatInput" class="chat-input" placeholder="Message...">
                        <button id="sendBtn" class="btn btn-primary" style="padding: 12px 28px; border-radius: 30px;">Send</button>
                    </div>

                </section>
            </div>

        </main>

        <!-- ── BOTTOM NAVIGATION (Mobile Only) ─────────────────── -->
        <nav class="bottom-nav">
            <a href="index.html" class="bottom-link">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <a href="upload.html" class="bottom-link">
                <i class="bi bi-plus-square-fill" style="font-size: 32px; color: var(--text-primary);"></i>
            </a>
            <a href="messages.html" class="bottom-link active">
                <i class="bi bi-chat-dots-fill"></i>
                <span>Chat</span>
            </a>
            <a href="profile.html" class="bottom-link">
                <img id="mobileAvatarImg" src="https://via.placeholder.com/24" class="avatar" style="width:24px; height:24px;">
                <span>Profile</span>
            </a>
        </nav>

    </div>

    <!-- ── NOTIFICATIONS ─────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── SCRIPTS ────────────────────────────────────────────── -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/messages.js"></script>
</body>
</html>
