<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Direct Messages</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <style>
        .chat-container {
            flex: 1;
            display: flex;
            background: var(--bg-surface);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-lg);
            margin: var(--space-xl);
            overflow: hidden;
            height: calc(100vh - 64px);
        }
        @media (min-width: 769px) { .messages-page { padding-left: var(--sidebar-width); } }
        @media (max-width: 768px) {
            .chat-container { margin: 0; border: none; border-radius: 0; height: calc(100vh - var(--bottom-nav-height)); }
            .chat-list { width: 100% !important; display: none; } /* On mobile, list and thread are separate views */
            .chat-list.active { display: flex; }
            .chat-thread { width: 100% !important; display: none; }
            .chat-thread.active { display: flex; }
        }

        .chat-list {
            width: 350px;
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .chat-list-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            cursor: pointer;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }

        .conversation-item:hover { background: rgba(255,255,255,0.03); }
        .conversation-item.active {
            background: rgba(255,0,80,0.05);
            border-left-color: var(--accent-primary);
        }

        .conv-info { flex: 1; overflow: hidden; }
        .conv-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
        .conv-last { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .chat-thread {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            position: relative;
        }

        .chat-thread-header {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            background: var(--bg-surface);
        }

        .messages-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: var(--radius-md);
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }

        .msg-in {
            background: var(--bg-surface-elevated);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-out {
            background: var(--accent-gradient);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input-area {
            padding: 20px 24px;
            background: var(--bg-surface);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .chat-input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid transparent;
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius-full);
            outline: none;
            transition: var(--transition);
        }

        .chat-input:focus { border-color: var(--accent-primary); background: var(--bg-surface-elevated); }
    </style>
</head>

<body>

    <!-- SIDEBAR (Desktop) -->
    <aside class="sidebar glass hide-mobile">
        <div class="sidebar-logo">
            <span class="gradient-text auth-logo">B</span>
            <h2 class="gradient-text">Blink</h2>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-link"><i class="bi bi-house-door"></i> <span>Home</span></a>
            <a href="messages.html" class="nav-link active"><i class="bi bi-chat-dots-fill"></i> <span>Messages</span></a>
            <a href="live.html" class="nav-link"><i class="bi bi-broadcast"></i> <span>Live</span></a>
            <a href="upload.html" class="nav-link"><i class="bi bi-plus-square"></i> <span>Create</span></a>
            <a href="profile.html" class="nav-link"><i class="bi bi-person"></i> <span>Profile</span></a>
        </nav>
    </aside>

    <!-- CONTENT -->
    <main class="messages-page">
        <div class="chat-container">
            
            <!-- LIST -->
            <div class="chat-list active" id="chatList">
                <div class="chat-list-header">
                    <h2 style="font-size:20px;">@messages</h2>
                    <button class="icon-btn" id="newChatBtn"><i class="bi bi-pencil-square"></i></button>
                </div>
                <div id="conversationContainer" style="flex:1;overflow-y:auto;">
                    <!-- INJECTED BY JS -->
                    <div style="padding:40px;text-align:center;color:var(--text-muted);">
                        <div class="loader" style="margin: 0 auto 10px;"></div>
                        Loading chats...
                    </div>
                </div>
            </div>

            <!-- THREAD -->
            <div class="chat-thread" id="chatThread">
                <div id="threadHeader" class="chat-thread-header" style="display:none;">
                    <button id="backBtn" class="icon-btn btn-ghost show-mobile-only"><i class="bi bi-chevron-left"></i></button>
                    <div class="avatar" id="threadAvatar" style="width:36px;height:36px;background:#333;"></div>
                    <div>
                        <div class="conv-name" id="threadName">Select a chat</div>
                        <div id="threadStatus" style="font-size:11px;color:var(--success);">online</div>
                    </div>
                </div>

                <div class="messages-area" id="messagesArea">
                    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);">
                        <i class="bi bi-chat-heart" style="font-size:64px;opacity:0.1;margin-bottom:20px;"></i>
                        <h3>Your Messages</h3>
                        <p>Send cinematic moments and chat with friends.</p>
                        <button class="btn btn-primary" style="margin-top:24px;" id="startChatBtn">Start a Chat</button>
                    </div>
                </div>

                <div class="chat-input-area" id="inputArea" style="display:none;">
                    <button class="icon-btn btn-ghost"><i class="bi bi-emoji-smile"></i></button>
                    <input type="text" id="chatInput" class="chat-input" placeholder="Message...">
                    <button class="btn btn-primary" id="sendBtn" style="padding:10px 24px;">Send</button>
                </div>
            </div>

        </div>
    </main>

    <!-- BOTTOM NAV (Mobile) -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-link"><i class="bi bi-house-door"></i> <span>Home</span></a>
        <a href="live.html" class="bottom-link"><i class="bi bi-broadcast"></i> <span>Live</span></a>
        <a href="upload.html" class="bottom-link"><i class="bi bi-plus-square"></i></a>
        <a href="messages.html" class="bottom-link active"><i class="bi bi-chat-dots-fill"></i> <span>Chat</span></a>
        <a href="profile.html" class="bottom-link"><i class="bi bi-person"></i> <span>Profile</span></a>
    </nav>

    <!-- NOTIFICATIONS -->
    <div id="toastContainer"></div>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/messages.js"></script>
</body>
</html>
