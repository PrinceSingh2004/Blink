<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blink | Feed</title>
<meta name="description" content="Your personalized video feed on Blink.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/feed.css">
</head>
<body>
<div class="app-layout">

  <!-- SIDEBAR -->
  <nav class="sidebar" role="navigation" aria-label="Main navigation">
    <a href="index.html" class="logo-container">
      <div class="logo-icon">B</div>
      <span class="logo-text">Blink</span>
    </a>
    <div class="sidebar-search">
      <i class="bi bi-search input-icon"></i>
      <input type="search" class="form-input" id="globalSearchInput" placeholder="Search creators..." aria-label="Search creators">
    </div>
    <ul class="nav-links">
      <li class="nav-item"><a href="index.html" class="active"><i class="bi bi-house-fill nav-icon"></i><span class="nav-text">Home</span></a></li>
      <li class="nav-item"><a href="upload.html"><i class="bi bi-upload nav-icon"></i><span class="nav-text">Upload</span></a></li>
      <li class="nav-item"><a href="messages.html"><i class="bi bi-chat-dots-fill nav-icon"></i><span class="nav-text">Messages</span></a></li>
      <li class="nav-item"><a href="live.html"><i class="bi bi-broadcast nav-icon"></i><span class="nav-text">Live</span></a></li>
      <li class="nav-item"><a href="profile.html"><i class="bi bi-person-circle nav-icon"></i><span class="nav-text">Profile</span></a></li>
    </ul>
    <div class="sidebar-user" onclick="window.location.href='profile.html'">
      <div class="sidebar-avatar" id="sidebarAvatar"></div>
      <div class="sidebar-info">
        <div class="sidebar-name" id="sidebarName">Loading...</div>
        <div class="sidebar-handle" id="sidebarHandle"></div>
      </div>
      <button class="sidebar-logout" id="logoutBtn" title="Sign Out" aria-label="Sign Out"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </nav>

  <!-- MAIN FEED -->
  <main class="main-content" role="main">

    <!-- Mood Selector -->
    <div class="mood-selector" id="moodSelector" role="tablist" aria-label="Mood filter">
      <div class="mood-pill active" data-mood="General" role="tab"><i class="bi bi-stars icon-inline"></i>For You</div>
      <div class="mood-pill" data-mood="Happy" role="tab"><i class="bi bi-emoji-smile-fill icon-inline"></i>Happy</div>
      <div class="mood-pill" data-mood="Motivation" role="tab"><i class="bi bi-rocket-takeoff-fill icon-inline"></i>Motivation</div>
      <div class="mood-pill" data-mood="Gaming" role="tab"><i class="bi bi-controller icon-inline"></i>Gaming</div>
      <div class="mood-pill" data-mood="Learning" role="tab"><i class="bi bi-journal-bookmark-fill icon-inline"></i>Learning</div>
      <div class="mood-pill" data-mood="Music" role="tab"><i class="bi bi-music-note-beamed icon-inline"></i>Music</div>
    </div>


    <!-- Feed -->
    <div class="feed-container" id="feedContainer" role="feed" aria-label="Video feed"></div>

  </main>
</div>

<!-- Comment Modal -->
<div class="modal-backdrop comment-modal" id="commentModal" role="dialog" aria-modal="true" aria-label="Comments">
  <div class="modal">
        <div class="modal-header">
      <h2 class="modal-title"><i class="bi bi-chat-left-text-fill icon-inline"></i>Comments</h2>
      <button class="modal-close" id="closeCommentModal" aria-label="Close"><i class="bi bi-x-lg"></i></button>
    </div>
    <div id="commentList"></div>
    <div class="comment-input-row">
      <input type="text" id="commentInput" class="form-input" placeholder="Write a comment…" maxlength="500" autocomplete="off">
            <button class="comment-send-btn" id="commentSendBtn" aria-label="Post comment"><i class="bi bi-send-fill"></i></button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<script src="../js/auth.js"></script>
<script src="../js/infinite-scroll.js"></script>
<script src="../js/feed.js"></script>
</body>
</html>
