<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blink | Create Account</title>
<meta name="description" content="Create your Blink account and start sharing short videos.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/auth.css">
</head>
<body>
<div class="auth-page">

  <!-- LEFT VISUAL -->
  <div class="auth-visual">
    <div class="auth-cards">
      <div class="auth-card"></div>
      <div class="auth-card"></div>
      <div class="auth-card"></div>
    </div>
    <div class="auth-brand">
      <div class="auth-logo-icon">B</div>
      <div class="auth-brand-name">Blink</div>
      <p class="auth-brand-tagline">Join millions of creators. Your moment starts here.</p>
    </div>
    <div class="auth-features">
      <div class="auth-feature"><span class="auth-feature-icon"><i class="bi bi-rocket-takeoff-fill"></i></span><span class="auth-feature-text">Go viral in seconds</span></div>
      <div class="auth-feature"><span class="auth-feature-icon"><i class="bi bi-music-note-beamed"></i></span><span class="auth-feature-text">Music, gaming, tech and more</span></div>
      <div class="auth-feature"><span class="auth-feature-icon"><i class="bi bi-people-fill"></i></span><span class="auth-feature-text">Collaborate with creators</span></div>
      <div class="auth-feature"><span class="auth-feature-icon"><i class="bi bi-graph-up"></i></span><span class="auth-feature-text">Track your analytics</span></div>
    </div>
  </div>

  <!-- RIGHT FORM -->
  <div class="auth-form-section">
    <div class="auth-form-header">
      <h1 class="auth-form-title">Create account</h1>
      <p class="auth-form-subtitle">Join Blink ? it's free forever</p>
    </div>

    <div id="registerAlert" class="auth-alert"></div>

    <form class="auth-form" id="registerForm" autocomplete="on" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon">@</span>
          <input type="text" name="username" id="username" class="form-input" placeholder="Choose a username" autocomplete="username" minlength="3" maxlength="30" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" name="email" id="email" class="form-input" placeholder="Your email address" autocomplete="email" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="passwordInput">Password</label>
        <div class="input-wrap">
          <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" id="passwordInput" class="form-input" placeholder="Create a strong password" autocomplete="new-password" minlength="6" required>
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password"><i class="bi bi-eye"></i></button>
        </div>
        <div class="pw-strength">
          <div class="pw-bar"></div>
          <div class="pw-bar"></div>
          <div class="pw-bar"></div>
        </div>
        <div class="pw-label" id="pwLabel" style="font-size:11px;color:var(--text-muted);margin-top:4px;"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <div class="input-wrap">
          <span class="input-icon"><i class="bi bi-shield-lock-fill"></i></span>
          <input type="password" name="confirmPassword" id="confirmPassword" class="form-input" placeholder="Repeat your password" autocomplete="new-password" required>
        </div>
      </div>

      <button type="submit" class="auth-submit-btn" id="registerBtn">
        <span class="btn-label">Create Account <i class="bi bi-stars"></i></span>
        <span class="btn-spinner"></span>
      </button>
    </form>

    <div class="auth-divider">or</div>
    <div class="auth-switch">Already have an account? <a href="login.html">Sign in</a></div>
  </div>

</div>
<div id="toastContainer"></div>
<script src="../js/auth.js"></script>
</body>
</html>
