<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>if(!localStorage.getItem('blink_token')) window.location.href='/login.html';</script>
<title>Blink | Live Experience</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  :root {
    --live-bg: #0a0a0c;
    --live-panel: #16161a;
    --live-border: rgba(255, 255, 255, 0.1);
    --pink: #ff2d6e;
    --pink-glow: rgba(255, 45, 110, 0.4);
  }

  body {
    background: var(--live-bg) !important;
    color: #fff !important;
    overflow: hidden;
  }

  .live-container {
    height: 100vh;
    display: grid;
    grid-template-columns: minmax(0, 3fr) minmax(340px, 1fr);
    gap: 0;
    background: var(--live-bg);
  }

  @media(max-width: 1100px) {
    .live-container {
      grid-template-columns: 1fr;
      grid-auto-rows: auto;
      height: auto;
      min-height: 100vh;
      overflow-y: auto;
    }
    body { overflow-y: auto; }
  }

  .live-video-section {
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--live-border);
  }

  #livePreview {
    width: 100%;
    height: 100%;
    object-fit: cover;
    max-height: 100vh;
  }

  .video-controls-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 24px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.6) 100%);
  }

  .live-status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: auto;
  }

  .live-badge {
    display: none; /* Controlled by JS */
    align-items: center;
    gap: 8px;
    background: var(--pink);
    color: #fff;
    padding: 6px 14px;
    border-radius: 6px;
    font-weight: 900;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 0 20px var(--pink-glow);
    animation: pulse-live 2s infinite;
  }

  @keyframes pulse-live {
    0% { transform: scale(1); box-shadow: 0 0 10px var(--pink-glow); }
    50% { transform: scale(1.05); box-shadow: 0 0 25px var(--pink-glow); }
    100% { transform: scale(1); box-shadow: 0 0 10px var(--pink-glow); }
  }

  .live-metrics {
    display: flex;
    gap: 12px;
  }

  .watcher-pill {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #stopLiveBtn {
    background: #ff3b30;
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-weight: 800;
    cursor: pointer;
    display: none;
    box-shadow: 0 8px 16px rgba(255, 59, 48, 0.3);
    text-transform: uppercase;
    font-size: 12px;
    transition: all 0.2s;
  }
  #stopLiveBtn:hover { transform: scale(1.05); background: #ff453a; }

  .live-sidebar {
    background: var(--live-panel);
    display: flex;
    flex-direction: column;
    height: 100vh;
    border-left: 1px solid var(--live-border);
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--live-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-size: 18px;
    font-weight: 800;
    margin: 0;
    background: linear-gradient(90deg, #fff, #999);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .live-comments {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--pink) transparent;
  }

  .live-comments::-webkit-scrollbar { width: 4px; }
  .live-comments::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 4px; }

  .chat-input-area {
    padding: 20px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid var(--live-border);
  }

  .input-wrapper {
    position: relative;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #liveMsgInput {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    transition: all 0.2s;
  }
  #liveMsgInput:focus {
    border-color: var(--pink);
    background: rgba(255,255,255,0.08);
    outline: none;
  }

  #sendLiveMsgBtn {
    background: var(--pink);
    color: #fff;
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  #sendLiveMsgBtn:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--pink-glow); }

  #discoveryMode {
    padding: 24px;
    overflow-y: auto;
    height: 100%;
  }

  .discovery-header {
    margin-bottom: 24px;
  }

  .discovery-header h2 {
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 8px;
  }

  .discovery-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  .start-live-cta {
    margin-top: 32px;
    padding: 24px;
    background: linear-gradient(135deg, rgba(255, 45, 110, 0.1), rgba(0, 0, 0, 0.4));
    border: 1px solid var(--pink);
    border-radius: 20px;
    text-align: center;
  }

  #goLiveBtn {
    background: var(--pink);
    color: #fff;
    border: none;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-weight: 800;
    margin-top: 16px;
    cursor: pointer;
    box-shadow: 0 10px 20px var(--pink-glow);
  }

  #watchOverlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(15px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
  }

  .watch-prompt {
    text-align: center;
  }

  .play-circle {
    width: 80px;
    height: 80px;
    background: var(--pink);
    border-radius: 50%;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px var(--pink-glow);
    animation: pulse-play 1.5s infinite;
  }

  @keyframes pulse-play {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  #exitLiveBtn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .reactions-panel {
    display: flex;
    gap: 10px;
    padding: 0 20px 10px;
  }

  .reaction-bubble {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    width: 40px;height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reaction-bubble:hover { transform: scale(1.2); background: rgba(255,255,255,0.1); }

  #floatingReactions {
    position: absolute;
    bottom: 40px;
    right: 20px;
    width: 100px;
    height: 400px;
    pointer-events: none;
    z-index: 50;
  }
</style>
</head>
<body>
<div class="app-layout">
  
  <nav class="sidebar">
    <a href="index.html" class="logo-container">
      <div class="logo-icon">B</div><span class="logo-text">Blink</span>
    </a>
    <ul class="nav-links">
      <li class="nav-item"><a href="index.html"><i class="bi bi-house nav-icon"></i><span class="nav-text">Home</span></a></li>
      <li class="nav-item"><a href="upload.html"><i class="bi bi-upload nav-icon"></i><span class="nav-text">Upload</span></a></li>
      <li class="nav-item"><a href="messages.html"><i class="bi bi-chat-dots nav-icon"></i><span class="nav-text">Messages</span></a></li>
      <li class="nav-item"><a href="live.html" class="active"><i class="bi bi-broadcast nav-icon"></i><span class="nav-text">Live</span></a></li>
      <li class="nav-item"><a href="profile.html"><i class="bi bi-person-circle nav-icon"></i><span class="nav-text">Profile</span></a></li>
    </ul>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebarAvatar"></div>
      <div class="sidebar-info">
        <div class="sidebar-name" id="sidebarName">...</div>
        <div class="sidebar-handle" id="sidebarHandle"></div>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="live-container">
      <!-- Video Section -->
      <section class="live-video-section">
        <div id="watchOverlay" style="display:none;">
          <div class="watch-prompt">
            <div class="play-circle"><i class="bi bi-play-fill" style="font-size:40px; margin-left:5px;"></i></div>
            <h3 style="font-weight:900; letter-spacing:1px;">TAP TO JOIN LIVE</h3>
          </div>
        </div>
        
        <video id="livePreview" autoplay playsinline muted></video>
        <div id="floatingReactions"></div>

        <div class="video-controls-overlay">
          <div class="live-status-bar">
            <div class="live-metrics">
              <span id="liveBadge" class="live-badge">LIVE</span>
              <div class="watcher-pill"><i class="bi bi-eye-fill"></i> <span id="viewCount">0</span></div>
              <div id="watchingInfo" class="watcher-pill" style="display:none;">@<span id="watchingUsername"></span></div>
            </div>
            <button id="stopLiveBtn">End Stream</button>
          </div>
        </div>
      </section>

      <!-- Sidebar Section -->
      <aside class="live-sidebar">
        <!-- Discovery Mode -->
        <div id="liveDiscovery">
          <div class="discovery-header">
            <h2>Live Now</h2>
            <p style="color:#888; font-size:14px;">Watch real-time moments from creators.</p>
          </div>
          <div id="liveStreamsGrid" class="discovery-grid">
            <!-- Populated by JS -->
          </div>
          <div class="start-live-cta">
            <i class="bi bi-camera-video" style="font-size:32px; color:var(--pink);"></i>
            <h3>Broadcasting?</h3>
            <p style="color:#888; font-size:13px; margin:8px 0;">Go live and connect with your followers instantly.</p>
            <button id="goLiveBtn">GO LIVE NOW</button>
          </div>
        </div>

        <!-- Chat Mode -->
        <div id="liveChatArea" style="display:none; height:100%; flex-direction:column;">
          <div class="sidebar-header">
            <h3 class="sidebar-title">Live Chat</h3>
            <button id="exitLiveBtn" title="Exit"><i class="bi bi-x-lg"></i></button>
          </div>
          
          <div class="live-comments" id="liveComments"></div>

          <div class="reactions-panel">
            <button class="reaction-bubble" onclick="window.Blink.sendReaction('❤️')">❤️</button>
            <button class="reaction-bubble" onclick="window.Blink.sendReaction('🔥')">🔥</button>
            <button class="reaction-bubble" onclick="window.Blink.sendReaction('👏')">👏</button>
            <button class="reaction-bubble" onclick="window.Blink.sendReaction('😂')">😂</button>
          </div>

          <div class="chat-input-area">
            <div class="input-wrapper">
              <input type="text" id="liveMsgInput" placeholder="Send a message..." maxlength="200">
              <button id="sendLiveMsgBtn"><i class="bi bi-send-fill"></i></button>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </main>
</div>

<div id="toastContainer"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/live.js"></script>
</body>
</html>
