<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<script>if(!localStorage.getItem('blink_token')) window.location.href='/login.html';</script>
<title>Blink | Live</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  .live-container{
    height:100vh;
    background:#ffffff;
    display:grid;
    grid-template-columns: minmax(0,2fr) minmax(320px,1fr);
    gap:16px;
    padding:18px;
  }
  @media(max-width:1100px){
    .live-container{grid-template-columns:1fr;grid-auto-rows:auto;height:auto;min-height:100vh;padding:12px;}
  }
  .live-video-wrap{
    position:relative;
    background:#f6f8fb;
    border-radius:20px;
    overflow:hidden;
    min-height:60vh;
    box-shadow:0 14px 36px rgba(15,23,42,0.12);
    border:1px solid var(--glass-border);
  }
  #livePreview{width:100%;height:100%;object-fit:cover;background:#fafafa;}
  .live-overlay{
    position:absolute;inset:0;pointer-events:none;z-index:10;
    display:flex;flex-direction:column;justify-content:space-between;
    padding:16px;gap:10px;
  }
  .live-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
  .live-badge{
    display:none;
    align-items:center;gap:8px;
    background:#e60023;color:#ffffff;padding:6px 12px;border-radius:999px;
    font-weight:900;font-size:12px;letter-spacing:0.8px;text-transform:uppercase;
    box-shadow:0 0 20px rgba(230,0,35,0.35);
    animation:blink 1s infinite;
  }
  .live-badge i{font-size:14px;line-height:1;}
  @keyframes blink{50%{opacity:.5;}}
  .viewer-count{
    background:rgba(255,255,255,0.9);
    padding:6px 12px;border-radius:10px;font-size:13px;
    backdrop-filter:blur(8px);display:flex;align-items:center;gap:6px;
    border:1px solid rgba(0,0,0,0.06);color:var(--text-primary);font-weight:700;
  }
  #stopLiveBtn{
    position:absolute;top:16px;right:16px;
    background:#ff2d55;color:#ffffff;border:none;
    padding:10px 18px;border-radius:999px;font-weight:800;
    cursor:pointer;display:none;z-index:20;
    box-shadow:0 10px 30px rgba(255,45,85,0.35);
    border:1px solid rgba(255,255,255,0.22);
    text-transform:uppercase;letter-spacing:0.8px;
    align-items:center;gap:8px;
    transition:transform .15s ease,box-shadow .15s ease,background .15s ease;
  }
  #stopLiveBtn:hover{background:#ff3f66;transform:translateY(-1px);}
  #stopLiveBtn:active{transform:scale(.97);}
  #goLiveBtn{
    background:var(--pink);
    color:#ffffff;border:none;padding:14px 20px;border-radius:14px;
    font-weight:800;cursor:pointer;box-shadow:0 0 24px rgba(255,45,110,.35);
    width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
    pointer-events:auto;position:relative;z-index:10;
  }
  #exitLiveBtn{
    background:rgba(0,0,0,0.03);
    width:46px;height:46px;border-radius:14px;border:1px solid rgba(0,0,0,0.08);
    display:flex;align-items:center;justify-content:center;color:var(--text-primary);cursor:pointer;
  }
  .live-chat-panel{
    background:var(--bg-panel, #ffffff);
    border:1px solid var(--glass-border, rgba(0,0,0,0.08));
    border-radius:18px;
    display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:5;
    box-shadow:0 14px 36px rgba(15,23,42,0.12);
  }
  .chat-header{
    padding:14px 16px;border-bottom:1px solid var(--glass-border, rgba(0,0,0,0.06));
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .live-comments{
    flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;
    padding:16px 16px 10px;scrollbar-width:thin;
    background:linear-gradient(180deg, rgba(0,0,0,0.01) 0%, rgba(0,0,0,0.02) 100%);
  }
  .live-comments::-webkit-scrollbar{width:6px;}
  .live-comments::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:10px;}
  .comment-bubble{
    background:#ffffff;
    border:1px solid rgba(0,0,0,0.08);
    padding:10px 12px;border-radius:14px;color:var(--text-primary);
    max-width:100%;word-break:break-word;white-space:pre-wrap;
    animation:slideInUp 0.25s ease-out;
  }
  .comment-bubble.self{background:linear-gradient(135deg, rgba(255,45,110,0.14), rgba(0,212,255,0.12));border-color:rgba(0,0,0,0.08);}
  .comment-meta{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:3px;}
  .comment-user{color:var(--pink,#ff2d6e);font-weight:800;}
  .comment-user.self{color:#00e676;}
  .comment-time{color:var(--text-muted,#888);font-weight:600;font-size:11px;}
  .comment-text{font-size:13px;line-height:1.5;}
  @keyframes slideInUp {from { opacity: 0; transform: translateY(8px); }to { opacity: 1; transform: translateY(0); }}
  .chat-composer{
    padding:12px;border-top:1px solid var(--glass-border, rgba(0,0,0,0.06));
    display:flex;align-items:center;gap:8px;
    position:sticky;bottom:0;background:var(--bg-panel,#ffffff);
  }
  .emoji-btn{
    width:42px;height:42px;border-radius:12px;
    background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.1);
    color:var(--text-primary);display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .emoji-picker{
    position:absolute;bottom:62px;left:12px;
    background:var(--bg-panel,#ffffff);border:1px solid var(--glass-border, rgba(0,0,0,0.1));
    border-radius:12px;padding:8px;display:grid;grid-template-columns:repeat(6,1fr);gap:6px;
    box-shadow:0 16px 40px rgba(0,0,0,0.45);z-index:30;
  }
  .emoji-picker.hidden{display:none;}
  .emoji-picker button{
    background:rgba(0,0,0,0.03);border:none;border-radius:10px;
    width:38px;height:38px;display:flex;align-items:center;justify-content:center;
    font-size:20px;cursor:pointer;transition:transform .1s ease, background .1s ease;
  }
  .emoji-picker button:hover{transform:translateY(-1px);background:rgba(0,0,0,0.06);}
  .live-actions{display:flex;gap:10px;align-items:center;}
  #liveMsgInput{
    flex:1;border-radius:14px;background:#ffffff;
    border:1px solid var(--glass-border);color:var(--text-color);
  }
  #sendLiveMsgBtn{
    width:46px;height:46px;border-radius:14px;padding:0;
    display:inline-flex;align-items:center;justify-content:center;
  }
  .reactions-bar{display:flex;gap:8px;padding:0 10px 8px;}
  .reaction-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-primary);filter:drop-shadow(0 6px 12px rgba(0,0,0,0.08));}
  #floatingReactions{position:absolute;bottom:40px;right:14px;width:120px;height:60%;pointer-events:none;z-index:20;overflow:hidden;}
</style>
</head>
<body>
<div class="app-layout">
  
  <!-- SIDEBAR (Standard) -->
  <nav class="sidebar">
    <a href="index.html" class="logo-container">
      <div class="logo-icon">B</div><span class="logo-text">Blink</span>
    </a>
    <div class="sidebar-search">
      <i class="bi bi-search input-icon"></i>
      <input type="search" class="form-input" id="globalSearchInput" placeholder="Search creators..." aria-label="Search creators">
    </div>
    <ul class="nav-links">
      <li class="nav-item"><a href="index.html"><i class="bi bi-house-fill nav-icon"></i><span class="nav-text">Home</span></a></li>
      <li class="nav-item"><a href="upload.html"><i class="bi bi-upload nav-icon"></i><span class="nav-text">Upload</span></a></li>
      <li class="nav-item"><a href="messages.html"><i class="bi bi-chat-dots-fill nav-icon"></i><span class="nav-text">Messages</span></a></li>
      <li class="nav-item"><a href="live.html" class="active"><i class="bi bi-broadcast nav-icon"></i><span class="nav-text">Live</span></a></li>
      <li class="nav-item"><a href="profile.html"><i class="bi bi-person-circle nav-icon"></i><span class="nav-text">Profile</span></a></li>
    </ul>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebarAvatar"></div>
      <div class="sidebar-info">
        <div class="sidebar-name" id="sidebarName">Loading...</div>
        <div class="sidebar-handle" id="sidebarHandle"></div>
      </div>
      <button class="sidebar-logout" id="logoutBtn"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </nav>

  <main class="main-content" style="padding:0">
    <div class="live-container">
      <div class="live-video-wrap">
        <div id="watchOverlay" style="position:absolute; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.8); cursor:pointer;">
            <div style="text-align:center; color:white;">
                <div style="width:72px; height:72px; border-radius:50%; background:var(--pink); display:flex; align-items:center; justify-content:center; margin-bottom:12px; box-shadow:0 0 30px var(--pink-glow);">
                    <i class="bi bi-play-fill" style="font-size:36px; margin-left:4px;"></i>
                </div>
                <div style="font-weight:900; font-size:18px; text-transform:uppercase; letter-spacing:1px;">Click to Watch</div>
            </div>
        </div>
        <video id="livePreview" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
        <button id="stopLiveBtn"><i class="bi bi-stop-circle-fill"></i> End Live</button>

        <div class="live-overlay">
          <div class="live-header">
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
              <span id="liveBadge" class="live-badge"><i class="bi bi-record-circle-fill"></i> LIVE</span>
              <div id="watchingInfo" style="display:none; color:white; font-size:12px; font-weight:700; background:rgba(0,0,0,0.4); padding:4px 10px; border-radius:4px;">Watching: @<span id="watchingUsername" class="user-id"></span></div>
              <div class="viewer-count"><i class="bi bi-eye-fill"></i><span id="viewCount">0</span> users</div>
            </div>
          </div>
        </div>

        <!-- Floating Reactions Container -->
        <div id="floatingReactions"></div>
      </div>

      <aside class="live-chat-panel" id="liveChatPanel">
        <!-- Discovery Mode (shown when not broadcasting) -->
        <div id="liveDiscovery" style="display:flex; flex-direction:column; gap:18px; padding:18px; background:var(--bg-panel);">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
            <h2 style="font-size:22px; font-weight:900; margin:0; display:flex; align-items:center; gap:8px;">
              <i class="bi bi-flame-fill icon-inline"></i>Live Now
            </h2>
            <span class="live-badge" style="display:inline-flex; animation:none;"><i class="bi bi-broadcast-pin"></i> Discover</span>
          </div>
          <div id="liveStreamsGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:14px; max-height:360px; overflow-y:auto;">
             <!-- Streamers will be populated here -->
             <div style="grid-column:1/-1; text-align:center; padding:20px; color:var(--text-muted)">Looking for active streamers...</div>
          </div>
          <div style="border-top:1px solid var(--glass-border); padding-top:14px;">
            <p style="font-size:14px; color:var(--text-secondary); margin-bottom:12px;">Want to share your moment?</p>
            <button id="goLiveBtn" class="btn btn-primary"><i class="bi bi-rocket-takeoff-fill icon-inline"></i>Start Your Live Stream</button>
          </div>
        </div>

        <!-- Chat Mode (shown when broadcasting or watching) -->
        <div id="liveChatArea" style="display:none; flex-direction:column; height:100%; flex:1; pointer-events:auto;">
            <div class="chat-header">
              <div style="display:flex; align-items:center; gap:10px;">
                <span class="live-badge" style="display:inline-flex; animation:none;"><i class="bi bi-record-circle-fill"></i> LIVE</span>
                <div style="font-weight:800; font-size:16px;">Live Chat</div>
              </div>
              <button id="exitLiveBtn" class="btn btn-secondary btn-sm" type="button" title="Leave stream"><i class="bi bi-x-lg"></i></button>
            </div>

            <div class="live-comments" id="liveComments"></div>
            
            <div class="reactions-bar">
              <button class="reaction-btn" type="button" aria-label="Send heart reaction" onclick="window.Blink.sendReaction('❤️')">❤️</button>
              <button class="reaction-btn" type="button" aria-label="Send fire reaction" onclick="window.Blink.sendReaction('🔥')">🔥</button>
              <button class="reaction-btn" type="button" aria-label="Send laugh reaction" onclick="window.Blink.sendReaction('😂')">😂</button>
              <button class="reaction-btn" type="button" aria-label="Send thumbs up reaction" onclick="window.Blink.sendReaction('👍')">👍</button>
            </div>

            <div class="chat-composer">
               <button id="emojiBtn" class="emoji-btn" type="button" aria-label="Add emoji"><i class="bi bi-emoji-smile"></i></button>
               <div id="emojiPicker" class="emoji-picker hidden" role="menu" aria-label="Emoji picker"></div>
               <input type="text" id="liveMsgInput" class="form-input" style="flex:1;" placeholder="Say something..." autocomplete="off">
               <button id="sendLiveMsgBtn" class="btn btn-primary btn-sm" type="button" title="Send message"><i class="bi bi-send-fill"></i></button>
            </div>
        </div>
      </aside>
    </div>
  </main>

</div>

<div id="toastContainer"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/live.js"></script>
</body>
</html>
