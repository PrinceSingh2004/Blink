<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blink | Forgot Password</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/auth.css">
<style>
  .forgot-container {
    max-width: 480px;
    margin: 80px auto;
    padding: 40px;
    background: var(--card-bg);
    border-radius: 24px;
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow-lg);
  }
  .step { display: none; }
  .step.active { display: block; animation: slideIn 0.3s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .otp-container {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px 0;
  }
  .otp-input {
    width: 45px;
    height: 55px;
    font-size: 22px;
    text-align: center;
    border: 2px solid #ccc;
    border-radius: 10px;
    transition: 0.2s;
    background: transparent;
    color: var(--text-primary);
  }
  .otp-input:focus {
    border-color: #ff004f;
    outline: none;
    transform: scale(1.05);
  }
  @media (max-width: 500px) {
    .otp-input {
      width: 38px;
      height: 50px;
      font-size: 18px;
    }
  }
  .input-wrap {
    position: relative;
  }
  .toggle-password {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--text-secondary);
    z-index: 5;
  }
</style>
</head>
<body>
<div class="auth-page">
  <div class="forgot-container">
    
    <!-- STEP 1: ENTER EMAIL -->
    <div id="step1" class="step active">
      <h1 class="auth-form-title">Reset password</h1>
      <p class="auth-form-subtitle">Enter your email and we'll send you a 6-digit OTP.</p>
      
      <form id="otpReqForm" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="forgotEmail">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon"><i class="bi bi-envelope-fill"></i></span>
            <input type="email" id="forgotEmail" class="form-input" placeholder="your@email.com" required>
          </div>
        </div>
        <button type="submit" class="auth-submit-btn" id="sendOtpBtn">
          <span class="btn-label">Send OTP <i class="bi bi-arrow-right"></i></span>
        </button>
      </form>
    </div>

    <!-- STEP 2: ENTER OTP -->
    <div id="step2" class="step">
      <h1 class="auth-form-title">Verify OTP</h1>
      <p class="auth-form-subtitle">We sent a 6-digit code to <b id="userEmailLabel"></b>.</p>
      
      <div class="otp-container">
        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" />
        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" />
        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" />
        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" />
        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" />
        <input type="text" maxlength="1" class="otp-input" inputmode="numeric" />
      </div>
      
      <button type="button" class="auth-submit-btn" id="verifyOtpBtn">
        <span class="btn-label">Verify Code <i class="bi bi-check-circle-fill"></i></span>
      </button>
      <div class="auth-switch" style="margin-top:20px;">Didn't get it? <a href="#" id="resendOtp">Resend</a></div>
    </div>

    <!-- STEP 3: NEW PASSWORD -->
    <div id="step3" class="step">
      <h1 class="auth-form-title">Create new password</h1>
      <p class="auth-form-subtitle">Choose a secure password for your account.</p>
      
      <form id="resetPassForm" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="newPassword">New Password</label>
          <div class="input-wrap">
            <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="newPassword" class="form-input" placeholder="Min 6 characters" minlength="6" required style="padding-right: 40px;">
            <span class="toggle-password" onclick="togglePass('newPassword', this)" title="Toggle Visibility"><i class="bi bi-eye"></i></span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmNewPassword">Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon"><i class="bi bi-shield-lock-fill"></i></span>
            <input type="password" id="confirmNewPassword" class="form-input" placeholder="Repeat password" required style="padding-right: 40px;">
            <span class="toggle-password" onclick="togglePass('confirmNewPassword', this)" title="Toggle Visibility"><i class="bi bi-eye"></i></span>
          </div>
        </div>
        <button type="submit" class="auth-submit-btn" id="resetBtn">
          <span class="btn-label">Update Password <i class="bi bi-check-lg"></i></span>
        </button>
      </form>
    </div>

    <div class="auth-switch" style="margin-top: 20px;"><a href="login.html">Back to Sign in</a></div>

  </div>
</div>

<div id="toastContainer"></div>
<script src="../js/auth.js"></script>
<script>
  const state = { email: '', otp: '' };

  function showStep(s) {
    document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
    document.getElementById('step' + s).classList.add('active');
  }

  function togglePass(inputId, iconEl) {
    const input = document.getElementById(inputId);
    const icon = iconEl.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  }

  // OTP Auto move + Backspace + Paste
  const inputs = document.querySelectorAll(".otp-input");

  inputs.forEach((input, index) => {
    input.addEventListener("input", (e) => {
      const value = e.target.value;
      if (!/^[0-9]$/.test(value)) {
        e.target.value = "";
        return;
      }
      if (index < inputs.length - 1) inputs[index + 1].focus();
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Backspace" && !input.value && index > 0) {
        inputs[index - 1].focus();
      }
    });
  });

  // PASTE FULL OTP
  document.addEventListener("paste", (e) => {
    if (!e.target.classList.contains("otp-input")) return;
    const paste = (e.clipboardData || window.clipboardData).getData("text");
    if (/^[0-9]{6}$/.test(paste)) {
      inputs.forEach((input, i) => input.value = paste[i]);
      inputs[5].focus();
      e.preventDefault();
    }
  });

  function getOTP() {
    return Array.from(inputs).map(i => i.value).join("");
  }

  // 30 Seconds cooldown for Resend OTP
  let resendTimer = null;
  const resendBtn = document.getElementById('resendOtp');
  
  function startResendCooldown() {
      let timeLeft = 30;
      resendBtn.style.pointerEvents = 'none';
      resendBtn.style.color = 'gray';
      
      resendTimer = setInterval(() => {
          timeLeft--;
          resendBtn.textContent = `Resend in ${timeLeft}s`;
          if (timeLeft <= 0) {
              clearInterval(resendTimer);
              resendBtn.style.pointerEvents = 'auto';
              resendBtn.style.color = '';
              resendBtn.textContent = 'Resend';
          }
      }, 1000);
  }

  resendBtn.onclick = async (e) => {
      e.preventDefault();
      try {
          const data = await window.Blink.apiRequest('/auth/send-otp', {
            method: 'POST',
            body: JSON.stringify({ email: state.email })
          });
          window.Blink.showToast('OTP resent successfully!', 'success');
          startResendCooldown();
      } catch (err) {
          window.Blink.showToast(err.message, 'error');
      }
  };

  // SEND OTP
  document.getElementById('otpReqForm').onsubmit = async (e) => {
    e.preventDefault();
    state.email = document.getElementById('forgotEmail').value;
    const btn = document.getElementById('sendOtpBtn');
    try {
      btn.disabled = true;
      const data = await window.Blink.apiRequest('/auth/send-otp', {
        method: 'POST',
        body: JSON.stringify({ email: state.email })
      });
      window.Blink.showToast(data.message, 'success');
      document.getElementById('userEmailLabel').textContent = state.email;
      showStep(2);
      startResendCooldown(); // Start cooldown on initial send
    } catch (err) {
      window.Blink.showToast(err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  };

  // VERIFY OTP
  document.getElementById('verifyOtpBtn').onclick = async () => {
    state.otp = getOTP();
    if (state.otp.length !== 6) return window.Blink.showToast("Enter complete 6-digit OTP", "error");
    
    try {
      const data = await window.Blink.apiRequest('/auth/verify-otp', {
        method: 'POST',
        body: JSON.stringify({ email: state.email, otp: state.otp })
      });
      window.Blink.showToast(data.message, 'success');
      showStep(3);
    } catch (err) {
      window.Blink.showToast(err.message, 'error');
    }
  };

  // RESET PASSWORD
  document.getElementById('resetPassForm').onsubmit = async (e) => {
    e.preventDefault();
    const newPassword = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmNewPassword').value;

    if (newPassword !== confirm) return window.Blink.showToast("Passwords don't match!", "error");

    try {
      const data = await window.Blink.apiRequest('/auth/reset-password', {
        method: 'POST',
        body: JSON.stringify({ email: state.email, otp: state.otp, newPassword })
      });
      window.Blink.showToast(data.message, 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    } catch (err) {
      window.Blink.showToast(err.message, 'error');
    }
  };
</script>
</body>
</html>
