<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blink | Contact Us</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/auth.css">
<style>
  .contact-container {
    max-width: 600px;
    margin: 80px auto;
    padding: 40px;
    background: var(--card-bg);
    border-radius: 24px;
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow-lg);
  }
  .contact-title {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 10px;
    background: var(--grad-brand);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .contact-subtitle {
     color: var(--text-secondary);
     margin-bottom: 30px;
  }
  .form-group textarea {
    width: 100%;
    padding: 14px 16px;
    background: #ffffff;
    border: 1.5px solid var(--glass-border);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 15px;
    min-height: 150px;
    transition: all 0.3s ease;
    resize: none;
  }
  .form-group textarea:focus {
    outline: none;
    border-color: #6366f1;
    background: rgba(255, 255, 255, 0.08);
  }
</style>
</head>
<body>
<div class="auth-page" style="display: flex; justify-content: center; align-items: center;">
  <div class="contact-container">
    <div class="contact-header">
      <h1 class="contact-title">Get in touch</h1>
      <p class="contact-subtitle">Have a question or feedback? We'd love to hear from you.</p>
    </div>

    <form id="contactForm" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <div class="input-wrap">
          <span class="input-icon"><i class="bi bi-person-fill"></i></span>
          <input type="text" id="name" class="form-input" placeholder="Your name" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="contactEmail">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" id="contactEmail" class="form-input" placeholder="your@email.com" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="message">Message</label>
        <textarea id="message" placeholder="How can we help?" required></textarea>
      </div>

      <button type="submit" class="auth-submit-btn" id="contactBtn">
        <span class="btn-label">Send Message <i class="bi bi-send-fill"></i></span>
        <span class="btn-spinner"></span>
      </button>
    </form>
    <div class="auth-switch" style="margin-top: 20px;"><a href="/index.html">Back to Home</a></div>
  </div>
</div>

<div id="toastContainer"></div>
<script src="../js/auth.js"></script>
<script>
  document.getElementById('contactForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('contactBtn');
    const name = document.getElementById('name').value;
    const email = document.getElementById('contactEmail').value;
    const message = document.getElementById('message').value;

    try {
      btn.disabled = true;
      const data = await window.Blink.apiRequest('/contact', {
        method: 'POST',
        body: JSON.stringify({ name, email, message })
      });
      window.Blink.showToast(data.message, 'success');
      document.getElementById('contactForm').reset();
    } catch (err) {
      window.Blink.showToast(err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
