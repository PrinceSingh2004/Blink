<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profile | Blink</title>
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

    <div class="app-container">
                <!-- Sidebar (Desktop) -->
        <aside class="sidebar">
            <div class="logo text-gradient flex-center py-4">Blink</div>
            <nav class="nav-links flex-col flex-1">
                <a href="index.html" class="nav-item" data-page="index">
                    <i class="bi bi-house-door-fill"></i>
                    <span class="nav-text">Home</span>
                </a>
                <div class="nav-item" id="searchTrigger">
                    <i class="bi bi-search"></i>
                    <span class="nav-text">Search</span>
                </div>
                <a href="upload.html" class="nav-item" data-page="upload">
                    <i class="bi bi-plus-square"></i>
                    <span class="nav-text">Create</span>
                </a>
                <a href="live.html" class="nav-item" data-page="live">
                    <i class="bi bi-broadcast"></i>
                    <span class="nav-text">Live</span>
                </a>
                <a href="messages.html" class="nav-item" data-page="messages">
                    <i class="bi bi-chat-dots-fill"></i>
                    <span class="nav-text">Messages</span>
                </a>
                <a href="profile.html" class="nav-item" data-page="profile">
                    <i class="bi bi-person-circle"></i>
                    <span class="nav-text">Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="nav-item w-full">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="nav-text">Logout</span>
                </button>
            </div>
        </aside>

        <!-- Profile Content -->
        <main class="main-content">
            <div class="profile-container animate-up">
                <header class="profile-header">
                    <div class="profile-avatar-wrap">
                        <img id="profileAvatarImg" src="https://via.placeholder.com/150" class="avatar">
                    </div>
                    <div class="profile-info">
                        <div class="profile-top">
                            <h2 id="profileUsername" class="profile-username">loading...</h2>
                            <button id="editProfileBtn" class="btn btn-secondary">Edit Profile</button>
                            <button class="btn btn-ghost btn-circle"><i class="bi bi-gear-wide"></i></button>
                        </div>
                        <div class="profile-stats">
                            <div class="stat-item"><span class="stat-value" id="postCount">0</span> posts</div>
                            <div class="stat-item"><span class="stat-value" id="followerCount">0</span> followers</div>
                            <div class="stat-item"><span class="stat-value" id="followingCount">0</span> following</div>
                        </div>
                        <div class="profile-bio">
                            <p id="profileBio">Experience the universe through Blink.</p>
                        </div>
                    </div>
                </header>

                <div class="profile-tabs">
                    <div class="profile-tab active"><i class="bi bi-grid-3x3"></i> POSTS</div>
                    <div class="profile-tab"><i class="bi bi-bookmark"></i> SAVED</div>
                    <div class="profile-tab"><i class="bi bi-person-bounding-box"></i> TAGGED</div>
                </div>

                <div id="videoGrid" class="profile-grid">
                    <!-- Grid items will be injected here -->
                </div>
            </div>
        </main>

                <!-- Mobile Nav -->
        <nav class="mobile-nav">
            <a href="index.html" class="nav-item" data-page="index">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <div class="nav-item" id="mobileSearchBtn">
                <i class="bi bi-search"></i>
                <span>Search</span>
            </div>
            <a href="upload.html" class="nav-item" data-page="upload">
                <i class="bi bi-plus-square"></i>
                <span>Create</span>
            </a>
            <a href="live.html" class="nav-item" data-page="live">
                <i class="bi bi-broadcast"></i>
                <span>Live</span>
            </a>
            <a href="messages.html" class="nav-item" data-page="messages">
                <i class="bi bi-chat-dots-fill"></i>
                <span>Messages</span>
            </a>
            <a href="profile.html" class="nav-item" data-page="profile">
                <i class="bi bi-person-circle"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="modal-overlay hidden">
        <div class="modal-content animate-up">
            <div class="modal-header">
                <h3>Edit Profile</h3>
                <button id="closeEditModal" class="btn-circle btn-ghost"><i class="bi bi-x-lg"></i></button>
            </div>
            <form id="editProfileForm" class="flex-col gap-4">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="editUsername" class="input-field">
                </div>
                <div class="input-group">
                    <label>Bio</label>
                    <textarea id="editBio" class="input-field" rows="3"></textarea>
                </div>
                <div class="input-group">
                    <label>Profile Picture URL</label>
                    <input type="text" id="editAvatar" class="input-field">
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Search Overlay (Same as index) -->
    <div id="searchOverlay" class="modal-overlay hidden">
        <div class="search-modal animate-up">
            <div class="search-header flex-between">
                <h2>Search</h2>
                <button id="closeSearch" class="btn-circle btn-ghost"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="search-bar">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Search for users..." autocomplete="off">
            </div>
            <div id="searchResults" class="search-results-list"></div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
