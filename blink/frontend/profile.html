<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Creator Profile</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div class="app-container">
        
        <!-- ── SIDEBAR (Desktop / Tablet) ─────────────────────── -->
        <aside class="app-sidebar">
            <div class="nav-logo">
                <span class="text-gradient" style="font-size: 40px; font-weight: 900;">B</span>
                <h2 class="text-gradient">Blink</h2>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-link">
                    <i class="bi bi-house-door-fill"></i>
                    <span>Home</span>
                </a>
                <a href="upload.html" class="nav-link">
                    <i class="bi bi-plus"></i>
                    <span>Upload</span>
                </a>
                <a href="messages.html" class="nav-link">
                    <i class="bi bi-chat-dots-fill"></i>
                    <span>Messages</span>
                </a>
                <a href="live.html" class="nav-link">
                    <i class="bi bi-broadcast"></i>
                    <span>Live</span>
                </a>
                <a href="profile.html" class="nav-link active" id="sidebarProfileLink">
                    <i class="bi bi-person-fill"></i>
                    <span>Profile</span>
                </a>
            </nav>

            <div style="flex: 1;"></div>

            <!-- New Sidebar Action Button -->
            <div class="sidebar-action-wrap">
                <button class="btn btn-primary btn-lg" onclick="window.location.href='upload.html'">
                    <i class="bi bi-plus"></i> Upload
                </button>
            </div>

            <!-- Sidebar User Card -->
            <div class="sidebar-profile-card">
                <img id="sidebarAvatarImg" src="https://via.placeholder.com/40" class="avatar" alt="User">
                <div class="user-meta">
                    <span id="sidebarUsername" class="username">prince.blink</span>
                    <span id="sidebarHandle" class="handle">@prince.blink</span>
                </div>
                <button class="logout-mini-btn" id="logoutBtn"><i class="bi bi-power"></i></button>
            </div>
        </aside>

        <!-- ── PROFILE CONTENT AREA ────────────────────────────── -->
        <main class="main-content">
            
            <!-- PROFILE COVER BANNER -->
            <div class="profile-banner">
                <div class="banner-overlay"></div>
                <div class="banner-actions">
                    <button class="btn-glass" id="editProfileBtn"><i class="bi bi-pencil-fill"></i> Edit Profile</button>
                    <button class="btn-primary-gradient">Follow</button>
                    <button class="btn-glass-icon"><i class="bi bi-share-fill"></i></button>
                </div>
            </div>

            <div class="profile-container">
                
                <!-- VERTICAL HEADER SECTION -->
                <header class="profile-header-alt">
                    <div class="profile-avatar-giant">
                        <img id="profileAvatar" src="https://via.placeholder.com/150" class="avatar" alt="Profile">
                        <div class="verified-badge"><i class="bi bi-patch-check-fill"></i></div>
                    </div>

                    <div class="profile-main-info">
                        <h1 id="profileUsername">prince.blink</h1>
                        <p id="profileHandle">@prince.blink</p>
                        <p id="profileBio" class="bio-text">No bio yet.</p>
                    </div>

                    <!-- STATS BAR -->
                    <div class="profile-stats-bar">
                        <div class="stat-box active">
                            <span class="stat-value">—</span>
                            <span class="stat-name">Videos</span>
                        </div>
                        <div class="stat-box">
                            <span id="followersCount" class="stat-value">0</span>
                            <span class="stat-name">Followers</span>
                        </div>
                        <div class="stat-box">
                            <span id="followingCount" class="stat-value">2</span>
                            <span class="stat-name">Following</span>
                        </div>
                        <div class="stat-box">
                            <span id="likesCount" class="stat-value">0</span>
                            <span class="stat-name">Likes</span>
                        </div>
                    </div>
                </header>

                <!-- GRID NAVIGATION -->
                <div class="profile-grid-tabs">
                    <button class="tab-item active">Videos</button>
                    <button class="tab-item">Liked</button>
                    <button class="tab-item">Saved</button>
                </div>

                <!-- POSTS GRID -->
                <div id="postGrid" class="profile-grid-feed">
                    <!-- Dynamic Grid Items -->
                    <div class="empty-state">
                        <i class="bi bi-collection-play"></i>
                        <p>Share your story with the world</p>
                    </div>
                </div>

            </div>
        </main>

        <!-- ── BOTTOM NAVIGATION (Mobile Only) ─────────────────── -->
        <nav class="bottom-nav">
            <a href="index.html" class="bottom-link">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <a href="upload.html" class="bottom-link">
                <i class="bi bi-plus-square-fill" style="font-size: 32px; color: var(--text-primary);"></i>
            </a>
            <a href="messages.html" class="bottom-link">
                <i class="bi bi-chat-dots-fill"></i>
                <span>Chat</span>
            </a>
            <a href="profile.html" class="bottom-link active">
                <img id="mobileAvatarImg" src="https://via.placeholder.com/24" class="avatar" style="width:24px; height:24px;">
                <span>Profile</span>
            </a>
        </nav>

    </div>

    <!-- ── AUTH MODAL: EDIT PROFILE ────────────────────────── -->
    <div id="editProfileModal" class="modal-overlay">
        <div class="modal-content glass">
            <div class="flex-between" style="margin-bottom: 24px;">
                <h3>Edit Profile</h3>
                <button id="closeEditModalBtn"><i class="bi bi-x-lg"></i></button>
            </div>
            <form id="editProfileForm">
                <div class="form-group">
                    <label class="form-label">Display Name</label>
                    <input type="text" name="display_name" class="form-input" placeholder="Your brand name">
                </div>
                <div class="form-group">
                    <label class="form-label">Bio (Max 150 chars)</label>
                    <textarea name="bio" class="form-input" style="height:100px; resize:none;" placeholder="Tell the world your story..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Website</label>
                    <input type="text" name="website" class="form-input" placeholder="yoursite.com">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:20px;">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- ── NOTIFICATIONS ─────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── SCRIPTS ────────────────────────────────────────────── -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
