<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Creator Profile</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <!-- We'll put unique profile styles here for Task 7 -->
    <style>
        .profile-page {
            min-height: 100vh;
            background: #050505;
            padding-bottom: 100px;
        }
        @media (min-width: 769px) { .profile-page { padding-left: var(--sidebar-width); } }

        /* ── HERO HEADER (Task 1) ─────────────────────────── */
        .profile-hero {
            position: relative;
            height: 350px;
            width: 100%;
            overflow: hidden;
        }
        .hero-banner {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
            transition: transform 0.5s ease;
        }
        .profile-hero:hover .hero-banner { transform: scale(1.05); }
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 40%, #050505);
        }

        .hero-content {
            position: absolute;
            bottom: -50px;
            left: 5%;
            display: flex;
            align-items: flex-end;
            gap: 24px;
            width: 90%;
            z-index: 10;
        }

        .avatar-container {
            position: relative;
            width: 160px;
            height: 160px;
        }
        .avatar-container .avatar {
            width: 100%;
            height: 100%;
            border: 6px solid #050505;
            background: #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: var(--transition);
        }
        .avatar-container:hover .avatar { transform: scale(1.05) rotate(3deg); border-color: var(--accent-primary); }

        .profile-badges {
            position: absolute;
            bottom: 10px;
            right: 0;
            display: flex;
            gap: 8px;
        }
        .badge-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 14px;
            border: 3px solid #050505;
        }

        /* ── PROFILE INFO ──────────────────────────────────── */
        .profile-details {
            padding: 80px 5% 0;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
        }
        @media (max-width: 1024px) { .profile-details { grid-template-columns: 1fr; } }

        .profile-identity h1 { font-size: 42px; font-weight: 800; margin-bottom: 8px; }
        .profile-identity p { color: var(--text-muted); font-size: 16px; line-height: 1.6; max-width: 600px; }
        
        .profile-actions { display: flex; gap: 16px; margin-top: 24px; }

        /* ── STATS CARDS (Task 2 & 3) ─────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 24px;
            border-radius: var(--radius-lg);
            text-align: center;
            transition: var(--transition);
        }
        .stat-card:hover { background: rgba(255,255,255,0.06); transform: translateY(-5px); border-color: var(--accent-primary); }
        .stat-icon { font-size: 24px; color: var(--accent-secondary); margin-bottom: 12px; }
        .stat-value { font-size: 28px; font-weight: 800; display: block; }
        .stat-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* ── TABS (Task 5) ─────────────────────────────────── */
        .tab-section { margin-top: 60px; padding: 0 5%; }
        .tabs-header {
            display: flex;
            gap: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: relative;
            margin-bottom: 30px;
        }
        .tab-btn {
            background: none; border: none; color: var(--text-muted);
            padding: 15px 0; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; gap: 10px;
        }
        .tab-btn.active { color: white; }
        .tab-btn i { font-size: 18px; }
        
        .tab-slider {
            position: absolute; bottom: 0; left: 0;
            width: 80px; height: 3px; background: var(--accent-gradient);
            border-radius: 3px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── MASONRY GRID (Task 6) ────────────────────────── */
        .masonry-grid {
            columns: 3 300px;
            column-gap: 20px;
        }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 20px;
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: #111;
            cursor: pointer;
            transition: var(--transition);
        }
        .masonry-item:hover { transform: scale(1.02); }
        .masonry-item img { width: 100%; height: auto; display: block; border-radius: var(--radius-md); }
        .masonry-overlay {
            position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8));
            opacity: 0; transition: 0.3s; padding: 20px;
            display: flex; align-items: flex-end; justify-content: space-between;
        }
        .masonry-item:hover .masonry-overlay { opacity: 1; }
        
        @media (max-width: 768px) {
            .profile-hero { height: 250px; }
            .hero-content { bottom: -70px; flex-direction: column; align-items: center; text-align: center; }
            .profile-details { padding-top: 100px; }
            .stats-grid { grid-template-columns: 1fr 1fr 1fr; }
            .stat-card { padding: 15px; }
            .stat-value { font-size: 20px; }
            .profile-identity h1 { font-size: 30px; }
        }
    </style>
</head>

<body>

    <!-- ── SIDEBAR (Desktop) ─────────────────────────────────── -->
    <aside class="sidebar glass hide-mobile">
        <div class="sidebar-logo">
            <span class="gradient-text auth-logo">B</span>
            <h2 class="gradient-text">Blink</h2>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-link"><i class="bi bi-house-door"></i> <span>Home</span></a>
            <a href="messages.html" class="nav-link"><i class="bi bi-chat-dots"></i> <span>Messages</span></a>
            <a href="live.html" class="nav-link"><i class="bi bi-broadcast"></i> <span>Live</span></a>
            <a href="upload.html" class="nav-link"><i class="bi bi-plus-square"></i> <span>Create</span></a>
            <a href="profile.html" class="nav-link active"><i class="bi bi-person-circle"></i> <span>Profile</span></a>
        </nav>
    </aside>

    <main class="profile-page">
        <!-- HERO SECTION -->
        <section class="profile-hero">
            <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070" class="hero-banner" alt="Banner">
            <div class="hero-overlay"></div>
            
            <div class="hero-content">
                <div class="avatar-container">
                    <div id="profileAvatar" class="avatar" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#111;font-size:48px;font-weight:800;color:var(--accent-primary);">U</div>
                    <div class="profile-badges">
                        <div class="badge-icon" title="Certified Creator"><i class="bi bi-patch-check-fill"></i></div>
                        <div class="badge-icon" style="background:#007bff;" title="Pro Tier"><i class="bi bi-lightning-fill"></i></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- DETAILS & STATS -->
        <section class="profile-details">
            <div class="profile-identity">
                <h1 id="profileHandle">@username</h1>
                <p id="profileDisplayName" style="font-weight:700;color:white;font-size:22px;margin-bottom:12px;">Display Name</p>
                <p id="profileBio">Passionate storyteller and digital visionary crafting cinematic moments on Blink. Join the journey into the next-gen of social media.</p>
                
                <div class="profile-actions">
                    <button class="btn btn-primary" id="editProfileBtn" style="height:54px; padding:0 30px; font-weight:700;">
                        <i class="bi bi-pencil-square" style="margin-right:8px;"></i> Edit Experience
                    </button>
                    <button class="icon-btn-ghost glass" id="shareProfileBtn" style="height:54px; width:54px;"><i class="bi bi-share"></i></button>
                    <button class="icon-btn-ghost glass" style="height:54px; width:54px;"><i class="bi bi-three-dots"></i></button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <i class="bi bi-grid-fill stat-icon"></i>
                    <span class="stat-value" id="postsCount">0</span>
                    <span class="stat-label">Blinks</span>
                </div>
                <div class="stat-card">
                    <i class="bi bi-people-fill stat-icon"></i>
                    <span class="stat-value" id="followersCount">0</span>
                    <span class="stat-label">Visions</span>
                </div>
                <div class="stat-card">
                    <i class="bi bi-eye-fill stat-icon"></i>
                    <span class="stat-value" id="followingCount">0</span>
                    <span class="stat-label">Following</span>
                </div>
            </div>
        </section>

        <!-- CONTENT TABS -->
        <section class="tab-section">
            <div class="tabs-header">
                <button class="tab-btn active" data-tab="videos"><i class="bi bi-camera-reels"></i> Videos</button>
                <button class="tab-btn" data-tab="images"><i class="bi bi-image"></i> Photos</button>
                <button class="tab-btn" data-tab="liked"><i class="bi bi-heart"></i> Liked</button>
                <div class="tab-slider" id="tabSlider"></div>
            </div>

            <div id="postGrid" class="masonry-grid">
                 <!-- INJECTED BY JS -->
                 <div style="grid-column: 1 / -1; padding:100px; text-align:center; color:var(--text-muted);">
                    <div class="loader" style="margin: 0 auto 20px;"></div>
                    <p>Loading your creative universe...</p>
                 </div>
            </div>
        </section>

    </main>

    <!-- EDIT PROFILE MODAL -->
    <div id="editProfileModal" class="modal">
        <div class="modal-content glass" style="max-width: 500px;">
            <div class="modal-header">
                <h3>Refine Experience</h3>
                <button class="icon-btn btn-ghost" id="closeEditModalBtn"><i class="bi bi-x-lg"></i></button>
            </div>
            <form id="editProfileForm" class="modal-body">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="display_name" class="form-input" placeholder="Your brand name">
                </div>
                <div class="form-group">
                    <label class="form-label">Universe Bio</label>
                    <textarea name="bio" class="form-input" style="height:120px;resize:none;" placeholder="Tell the world your story..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Digital HQ (Website)</label>
                    <input type="text" name="website" class="form-input" placeholder="yoursite.com">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; height:50px; margin-top:20px;">Update Profile</button>
            </form>
        </div>
    </div>

    <!-- BOTTOM NAV (Mobile) -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-link"><i class="bi bi-house-door"></i></a>
        <a href="messages.html" class="bottom-link"><i class="bi bi-chat-dots"></i></a>
        <a href="upload.html" class="bottom-link"><i class="bi bi-plus-square"></i></a>
        <a href="live.html" class="bottom-link"><i class="bi bi-broadcast"></i></a>
        <a href="profile.html" class="bottom-link active"><i class="bi bi-person-circle"></i></a>
    </nav>

    <!-- NOTIFICATIONS -->
    <div id="toastContainer"></div>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
