<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | @username</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body class="theme-dark">

    <div class="app-layout">
        <!-- SIDEBAR -->
        <nav class="sidebar">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
                <a href="index.html" class="logo-container" style="margin-bottom: 0;">
                    <div class="logo-icon">B</div><span class="logo-text">Blink</span>
                </a>
                <button id="themeToggle" title="Toggle Theme">🌙</button>
            </div>
            
            <div class="sidebar-search">
                <i class="bi bi-search input-icon" style="position:absolute; left:12px; top:12px; font-size:14px; color:var(--text-muted)"></i>
                <input type="search" class="form-input" id="globalSearchInput" placeholder="Search creators...">
                <div id="globalSearchResults" class="search-results-dropdown"></div>
            </div>

            <ul class="nav-links">
                <li class="nav-item"><a href="index.html"><i class="bi bi-house-door-fill nav-icon"></i><span class="nav-text">Home</span></a></li>
                <li class="nav-item"><a href="upload.html"><i class="bi bi-plus-square-fill nav-icon"></i><span class="nav-text">Upload</span></a></li>
                <li class="nav-item"><a href="messages.html"><i class="bi bi-chat-dots-fill nav-icon"></i><span class="nav-text">Messages</span><span id="notifBadge" class="nav-badge" style="display:none">0</span></a></li>
                <li class="nav-item"><a href="live.html"><i class="bi bi-broadcast nav-icon"></i><span class="nav-text">Live</span></a></li>
                <li class="nav-item"><a href="profile.html" class="active"><i class="bi bi-person-circle nav-icon"></i><span class="nav-text">Profile</span></a></li>
            </ul>

            <div class="sidebar-user">
                <div class="sidebar-avatar" id="sidebarAvatar"></div>
                <div class="sidebar-info">
                    <div class="sidebar-name" id="sidebarName">Loading...</div>
                    <div class="sidebar-handle" id="sidebarHandle"></div>
                </div>
                <button class="sidebar-logout" id="logoutBtn"><i class="bi bi-box-arrow-right"></i></button>
            </div>
        </nav>

        <!-- MAIN PROFILE -->
        <main class="main-content">
            <div id="loader" class="loader-overlay hidden">
                <div class="loader-spinner"></div>
            </div>

            <div class="profile-container">
                <div class="profile-hero">
                    <div class="profile-avatar-wrap" id="avatarWrap">
                        <img id="profileAvatar" src="" alt="Avatar" class="avatar-img hidden">
                        <div id="avatarInitial" class="avatar-initial">?</div>
                    </div>
                    
                    <div class="profile-main-info">
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
                            <h1 id="pUsername">@loading</h1>
                            <button id="followBtn" class="btn btn-primary btn-sm" style="display:none">Follow</button>
                        </div>
                        <p id="pBio" class="bio-text">Loading bio...</p>
                        
                        <div class="profile-stats">
                            <div class="stat"><span id="sVideos">0</span><label>Posts</label></div>
                            <div class="stat"><span id="sFollowers">0</span><label>Followers</label></div>
                            <div class="stat"><span id="sFollowing">0</span><label>Following</label></div>
                        </div>

                        <div class="profile-actions">
                            <button id="editBtn" class="btn btn-secondary">Edit Profile</button>
                            <button id="passwordBtn" class="btn btn-outline" style="border:1px solid var(--border)">Security</button>
                        </div>
                    </div>
                </div>

                <div id="errorArea" class="error-msg hidden">
                    <i class="bi bi-exclamation-circle" style="font-size:32px;margin-bottom:12px;display:block"></i>
                    <h3>User Not Found</h3>
                    <p style="color:var(--text-muted);margin-bottom:20px">The profile you're looking for doesn't exist.</p>
                    <a href="index.html" class="btn btn-primary">Go Home</a>
                </div>

                <!-- Tabs (Grid/Info) -->
                <div class="profile-tabs" style="border-top:1px solid var(--border);margin-top:40px;padding-top:20px;">
                    <div class="tab-item active"><i class="bi bi-grid-3x3"></i> ALL POSTS</div>
                </div>
                <div id="userPostsGrid" class="posts-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:10px"></div>
            </div>
        </main>
    </div>

    <!-- MODAL: EDIT PROFILE -->
    <div id="editModal" class="modal-backdrop">
        <div class="modal">
            <h2 style="margin-bottom:20px">Edit Profile</h2>
            <form id="editForm">
                <div class="modal-upload" style="text-align:center;margin-bottom:20px">
                    <img id="editPreview" src="" alt="Preview" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid var(--primary);margin-bottom:12px">
                    <input type="file" id="avatarInput" accept="image/*" class="hidden">
                    <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('avatarInput').click()">Change Photo</button>
                </div>
                
                <div class="form-group" style="margin-bottom:16px">
                    <label style="display:block;font-size:12px;margin-bottom:4px;color:var(--text-muted)">Username</label>
                    <input type="text" id="editUsername" class="form-input" style="width:100%" required minlength="3">
                </div>
                
                <div class="form-group" style="margin-bottom:24px">
                    <label style="display:block;font-size:12px;margin-bottom:4px;color:var(--text-muted)">Bio</label>
                    <textarea id="editBio" class="form-textarea" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;padding:12px;color:#fff;resize:none" placeholder="Tell us about yourself..." rows="3"></textarea>
                </div>

                <div class="modal-btns" style="display:flex;gap:12px">
                    <button type="button" class="btn btn-outline" style="flex:1" id="cancelEdit">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex:1" id="saveEdit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
