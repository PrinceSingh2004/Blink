<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Profile | Blink</title>
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/feed.css">
</head>

<body>

    <div class="app-container">
        
        <!-- ── SIDEBAR (Desktop) ─────────────────────── -->
        <aside class="app-sidebar">
            <div class="nav-logo">
                <span class="text-gradient" style="font-size: 32px;">B</span>
                <h2 class="text-gradient">Blink</h2>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-link">
                    <i class="bi bi-house-door"></i>
                    <span>Home</span>
                </a>
                <a href="upload.html" class="nav-link">
                    <i class="bi bi-plus-square"></i>
                    <span>Create</span>
                </a>

                <a href="messages.html" class="nav-link">
                    <i class="bi bi-chat-dots"></i>
                    <span>Messages</span>
                </a>
                <a href="profile.html" class="nav-link active">
                    <i class="bi bi-person-fill"></i>
                    <span>Profile</span>
                </a>
            </nav>

            <div class="sidebar-footer" style="padding: 20px;">
                <button id="logoutBtn" class="nav-link w-full">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- ── PROFILE CONTENT AREA ──────────────────────────── -->
        <main class="main-content">
            
            <div class="profile-header animate-fade" id="profileHeader">
                <div class="profile-avatar-wrap">
                    <img id="profileAvatarImg" src="https://via.placeholder.com/150" class="avatar profile-avatar">
                </div>
                
                <div class="profile-info">
                    <div class="profile-top">
                        <span id="profileUsername" class="profile-username">Loading...</span>
                        <button class="btn btn-secondary btn-sm" id="editProfileBtn">Edit Profile</button>
                    </div>

                    <div class="profile-stats">
                        <div class="stat-item">
                            <span class="stat-value" id="postCount">0</span>
                            <span>Blinks</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="followerCount">0</span>
                            <span>Followers</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="followingCount">0</span>
                            <span>Following</span>
                        </div>
                    </div>

                    <p id="profileBio" class="profile-bio">Experience the universe through Blink.</p>
                </div>
            </div>

            <div class="profile-content animate-fade">
                <div class="profile-tabs">
                    <div class="profile-tab active"><i class="bi bi-grid-3x3"></i> My Blinks</div>
                    <div class="profile-tab"><i class="bi bi-bookmark"></i> Saved</div>
                    <div class="profile-tab"><i class="bi bi-person-bounding-box"></i> Tagged</div>
                </div>

                <div id="videoGrid" class="profile-grid">
                    <!-- Dynamic grid items go here -->
                    <div class="grid-placeholder">
                        <i class="bi bi-camera-reels"></i>
                        <p>No Blinks shared yet.</p>
                        <a href="upload.html" class="btn btn-primary btn-sm">Share your first Moment</a>
                    </div>
                </div>
            </div>

        </main>

        <!-- ── MOBILE BOTTOM NAVIGATION ─────────────────── -->
        <nav class="bottom-nav">
            <a href="index.html" class="bottom-link">
                <i class="bi bi-house-door"></i>
            </a>

            <a href="upload.html" class="bottom-link">
                <i class="bi bi-plus-square"></i>
            </a>
            <a href="messages.html" class="bottom-link">
                <i class="bi bi-chat-dots"></i>
            </a>
            <a href="profile.html" class="bottom-link active">
                <i class="bi bi-person-fill"></i>
            </a>
        </nav>

    </div>

    <!-- ── NOTIFICATIONS ─────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── SCRIPTS ────────────────────────────────────────────── -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
