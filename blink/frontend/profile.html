<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Blink | Profile</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>

    <!-- ── SIDEBAR (Desktop) ─────────────────────────────────── -->
    <aside class="sidebar glass">
        <div class="sidebar-logo">
            <span class="gradient-text auth-logo">B</span>
            <h2 class="gradient-text">Blink</h2>
        </div>
        
        <nav class="nav-links">
            <a href="index.html" class="nav-link">
                <i class="bi bi-house-door"></i>
                <span>Home</span>
            </a>
            <a href="messages.html" class="nav-link">
                <i class="bi bi-chat-dots"></i>
                <span>Messages</span>
            </a>
            <a href="live.html" class="nav-link">
                <i class="bi bi-broadcast"></i>
                <span>Live</span>
            </a>
            <a href="upload.html" class="nav-link">
                <i class="bi bi-plus-square"></i>
                <span>Create</span>
            </a>
            <a href="profile.html" class="nav-link active" id="sidebarProfileLink">
                <div class="story-ring sidebar-avatar-wrap" style="width:32px;height:32px;">
                    <div id="sidebarAvatar" class="avatar" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#333;font-size:12px;">U</div>
                </div>
                <div style="display:flex;flex-direction:column;line-height:1.2;">
                    <span id="sidebarName">Profile</span>
                    <span id="sidebarHandle" style="font-size:11px;color:var(--text-muted);">@handle</span>
                </div>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <button id="logoutBtn" class="nav-link" style="width:100%;text-align:left;">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- ── PROFILE CONTENT ───────────────────────────────────── -->
    <main class="profile-page app-container animate-fade-in">
        
        <!-- HEADER -->
        <header class="profile-header">
            <div class="profile-avatar-wrap">
                <div class="story-ring" style="padding:4px;width:100%;height:100%;">
                    <div id="profileAvatar" class="avatar" style="width:100%;height:100%;background:#333;display:flex;align-items:center;justify-content:center;font-size:48px;">U</div>
                </div>
            </div>

            <div class="profile-info">
                <div class="profile-title-row">
                    <h2 class="profile-handle" id="profileHandle">@loading</h2>
                    <button class="btn btn-secondary" id="editProfileBtn">Edit Profile</button>
                    <button class="icon-btn" id="profileOptionsBtn"><i class="bi bi-gear-fill"></i></button>
                </div>

                <div class="profile-stats">
                    <div class="stat-item"><span class="stat-value" id="postsCount">0</span> posts</div>
                    <div class="stat-item"><span class="stat-value" id="followersCount">0</span> followers</div>
                    <div class="stat-item"><span class="stat-value" id="followingCount">0</span> following</div>
                </div>

                <div class="profile-bio">
                    <span class="profile-full-name" id="profileDisplayName">Blink User</span>
                    <p id="profileBio">Digital creator. Sharing daily vlogs and cinematic moments on Blink. ✨</p>
                    <a href="#" class="profile-link" id="profileWebsite" style="color:var(--accent-secondary);font-size:14px;font-weight:600;">linktr.ee/blink</a>
                </div>
            </div>
        </header>

        <!-- TABS -->
        <nav class="profile-tabs">
            <div class="profile-tab active"><i class="bi bi-grid-3x3"></i> Posts</div>
            <div class="profile-tab"><i class="bi bi-camera-reels"></i> Reels</div>
            <div class="profile-tab"><i class="bi bi-person-badge"></i> Tagged</div>
        </nav>

        <!-- GRID -->
        <div class="post-grid" id="postGrid">
            <!-- SKELETON LOADING -->
            <div class="grid-item skeleton"></div>
            <div class="grid-item skeleton"></div>
            <div class="grid-item skeleton"></div>
            <div class="grid-item skeleton"></div>
            <div class="grid-item skeleton"></div>
            <div class="grid-item skeleton"></div>
        </div>

    </main>

    <!-- ── EDIT PROFILE MODAL ────────────────────────────────── -->
    <div class="modal-overlay" id="editProfileModal">
        <div class="modal-content glass">
            <div class="flex-between" style="margin-bottom:var(--space-xl);">
                <h3>Edit Profile</h3>
                <button class="btn-ghost icon-btn" id="closeEditModalBtn"><i class="bi bi-x-lg"></i></button>
            </div>

            <form id="editProfileForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <div class="input-wrap">
                        <span class="input-icon"><i class="bi bi-person"></i></span>
                        <input type="text" name="display_name" class="form-input" placeholder="Your name">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Bio</label>
                    <div class="input-wrap">
                        <textarea name="bio" class="form-input" style="height:100px;resize:none;padding-left:14px;" placeholder="Tell the world about yourself"></textarea>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Website</label>
                    <div class="input-wrap">
                        <span class="input-icon"><i class="bi bi-link-45deg"></i></span>
                        <input type="text" name="website" class="form-input" placeholder="https://example.com">
                    </div>
                </div>

                <div class="flex-center" style="margin-top:20px;">
                    <button type="submit" class="btn btn-primary" style="width:100%;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── BOTTOM NAV (Mobile Only) ──────────────────────────── -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-link">
            <i class="bi bi-house-door"></i>
            <span>Home</span>
        </a>
        <a href="live.html" class="bottom-link">
            <i class="bi bi-broadcast"></i>
            <span>Live</span>
        </a>
        <a href="upload.html" class="bottom-link">
            <i class="bi bi-plus-square" style="font-size:28px;"></i>
        </a>
        <a href="messages.html" class="bottom-link">
            <i class="bi bi-chat-dots"></i>
            <span>Chat</span>
        </a>
        <a href="profile.html" class="bottom-link active">
            <div id="bottomAvatar" class="avatar show-mobile-only" style="width:24px;height:24px;background:#333;display:flex;align-items:center;justify-content:center;font-size:10px;">U</div>
            <span>Profile</span>
        </a>
    </nav>

    <!-- ── NOTIFICATIONS ─────────────────────────────────────── -->
    <div id="toastContainer"></div>

    <!-- ── SCRIPTS ────────────────────────────────────────────── -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
