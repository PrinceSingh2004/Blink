services:
  # ── Web Service (Node.js Express) ──────────────────────────────
  - type: web
    name: blink-app
    runtime: node
    plan: free
    region: oregon          # Change: singapore / frankfurt / ohio
    rootDir: blink/backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000          # Render assigns this automatically
      - key: DB_HOST
        sync: false           # Set manually in Render dashboard
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        generateValue: true   # Auto-generate a secure random secret
      - key: JWT_EXPIRES
        value: 7d
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLIENT_URL
        sync: false           # Set to your Render web service URL
